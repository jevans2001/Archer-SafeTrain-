Both are required</strong> — a tag alone without a physical lock is not LOTO compliant.</p></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-lock-open\"></i>Removing the LOTO</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Unlock with YOUR key → remove lock and tag → return to LOTO station</div></div></div><div class=\"info-box\">You are NOT responsible for re-energizing — that is the requester's responsibility. Your LOTO responsibility ends when the lock and tag are returned to the station.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-star\"></i>LOTO Best Practices — Absolute Rules</div><div class=\"warn-box\" style=\"font-size:15px;padding:18px 20px\"><strong>NEVER remove someone else's LOTO.</strong><br><br>No exceptions — not if their work appears complete, not if you cannot reach them, not for any reason. Removing another person's LOTO can expose them to live voltage without warning. Escalate to a manager if the LOTO owner is unavailable.</div><div class=\"rule-list\" style=\"margin-top:12px\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>The LOTO key stays with YOU at all times while the system is locked out</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>You CAN lock out an already locked-out system — multiple locks are permitted and encouraged</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Always fill in your name and as much information as possible on the tag</div></div></div></div><div class=\"knowledge-check\" data-id=\"l2c3\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What are the 4 LOTO steps in order? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">1) Label the lock and key. 2) Fill in the tag. 3) De-energize the system. 4) Lock-Out and Tag-Out the disconnect.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Why stand beside the disconnect instead of in front? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Arc flash during the switching action projects energy outward from the front. Standing to the side and turning your face away significantly reduces exposure if arc flash occurs during de-energization.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Can you remove another person's LOTO if their work appears complete? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Never. Contact that person and have them remove it themselves. If unavailable, escalate to a manager. Removing another person's LOTO can expose them to live voltage without warning.</div></div></div>";
CHAPTERS["l2c4"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-list-numbers\"></i>The 5 Safety Rules for De-energized HV Work</div><p>The 5 Safety Rules are the mandatory procedure for every Level 2 task on a de-energized HV system. Follow them in order, every time, without exception. These are not suggestions — they are requirements. Skipping or reordering steps creates life-threatening conditions.</p><p>These rules also implement the Elimination hazard control technique from the hierarchy. When elimination is possible, this is the procedure you follow to achieve it safely.</p><div class=\"warn-box\">These rules apply every time — for quick tasks, for familiar equipment, for work you have done many times before. Familiarity is one of the leading causes of HV incidents. The rules exist precisely because humans become complacent with routine tasks.</div></div><div class=\"section-block\"><div class=\"five-rules-list\"><div class=\"five-rule\"><div class=\"five-rule-header\"><div class=\"five-num\">1</div><div class=\"five-title\">Wear Appropriate PPE</div></div><p>Before approaching the disconnect, identify the NFPA 70E PPE category required to operate it. Check the arc flash label on the equipment. Put on all required items. <strong>This step comes first</strong> because the act of operating the disconnect itself carries arc flash risk — you need PPE on before you approach it.</p></div><div class=\"five-rule\"><div class=\"five-rule-header\"><div class=\"five-num\">2</div><div class=\"five-title\">Disconnect the Power Source</div></div><p>Turn off ALL power sources to the HV system. Multiple inputs? All must be off. Stand next to the disconnect — not in front. Turn your face away when switching off. If multiple power sources exist and only one is disconnected, the system remains energized.</p></div><div class=\"five-rule\"><div class=\"five-rule-header\"><div class=\"five-num\">3</div><div class=\"five-title\">Secure Against Reconnection (LOTO)</div></div><p>Follow the full LOTO procedure: label lock and key, fill in tag, apply lock and tag to the disconnect. This physically prevents re-energization. Without this step, anyone could flip the switch while you are working on the system.</p></div><div class=\"five-rule\"><div class=\"five-rule-header\"><div class=\"five-num\">4</div><div class=\"five-title\">Verify the System is Voltage-Free</div></div><p>Use an appropriate measuring device to confirm the system is actually voltage-free. <strong>Do not assume.</strong> Stored energy in capacitors, batteries, or inductors can keep a system energized long after the power source is disconnected. This step exists because assumptions cause fatalities.</p></div><div class=\"five-rule\"><div class=\"five-rule-header\"><div class=\"five-num\">5</div><div class=\"five-title\">Erect Barriers and Place Signage</div></div><p>Barriers at the greater of: limited approach boundary OR arc flash boundary. Signage prevents unauthorized entry. This protects coworkers from accidentally entering your work area where they may be exposed to other hazards.</p></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-arrow-right\"></i>After Work is Complete</div><p>Unlock the LOTO lock, remove the tag, return both to the LOTO station. <strong>You are not required to re-energize</strong> — that is the responsibility of whoever requested the work.</p></div><div class=\"knowledge-check\" data-id=\"l2c4\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">List the 5 Safety Rules in order. <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">1) Wear appropriate PPE. 2) Disconnect the power source. 3) Secure against reconnection (LOTO). 4) Verify the system is voltage-free. 5) Erect barriers and place signage.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Why is Step 4 (verify voltage-free) separate from Steps 2 and 3? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Because disconnecting and applying LOTO do not guarantee voltage-free. Stored energy in capacitors, batteries, or inductors can keep a system energized after disconnection. Independent verification with a measuring device is required.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Why does Step 1 (PPE) come before Step 2 (disconnect)? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Because operating the disconnect itself carries arc flash risk. You need PPE on before approaching the disconnect to turn it off. You cannot apply PPE retroactively after an arc flash has occurred.</div></div></div>";
CHAPTERS["l2c5"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-shield-half\"></i>Insulation Cover</div><p>An insulation blanket or cover placed over exposed, energized HV terminals creates a physical barrier against accidental contact, eliminating the shock hazard in that location.</p><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Cover HV terminals with an insulation blanket when energized and working nearby</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Always review the electrical voltage rating of the blanket before use — an under-rated blanket provides no real protection</div></div></div><div class=\"warn-box\"><strong>The insulation blanket protects ONLY from electric shock hazard. It does NOT protect against arc flash.</strong><br><br>This is a commonly misunderstood point. Workers who place an insulation cover and then remove their arc flash PPE are unprotected from arc flash. The two hazards require separate controls and must not be confused.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-bulb\"></i>Hazard Lights and e-STOP</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-bulb\"></i></div><div>Hazard light shall be used to indicate the presence of energized HV. <strong>ON only when energized — OFF when not.</strong> Never leave on after de-energizing.</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-emergency-bed\"></i></div><div>All HV test benches must have an accessible e-STOP. Before starting, every person in the area must know exactly where it is. e-STOP does NOT guarantee de-energization — stored energy may remain.</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-barrier-block\"></i>Barriers, Labels, and Buddy System</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Barriers at greater of: limited approach boundary OR arc flash boundary</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Every HV equipment must have safety labels clearly stating the potential danger</div></div><div class=\"rule-row\"><div class=\"rule-icon red\"><i class=\"ti ti-users\"></i></div><div><strong>Follow buddy system for all Level 2 and Level 3 tasks. Never perform HV work alone.</strong> Your buddy must know the e-STOP location, monitor for hazards, and be ready to call for emergency help.</div></div></div></div><div class=\"knowledge-check\" data-id=\"l2c5\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">An insulation cover has been placed over an energized terminal. Are you protected from arc flash? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. An insulation cover only eliminates the electric shock hazard. Arc flash hazard remains and requires separate protection — arc flash PPE must still be worn inside approach boundaries.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Why is leaving the hazard light on after de-energizing dangerous? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">It creates dangerous confusion. Someone approaching may see no light and assume the system is de-energized, even if it is actually energized. The hazard light only communicates useful information if used consistently and correctly.</div></div></div>";
CHAPTERS["l3c1"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-checklist\"></i>Normal Operation — All 6 Conditions Required</div><p>At Level 3, the Normal Operation definition is central to every task classification you make. A system is only in Normal Operation per NFPA 70E Article 130.2(A)(4) if ALL SIX conditions are simultaneously true. One failure — regardless of how the system looks or performs — immediately escalates the task to Level 3 with both hazards present.</p><div class=\"normal-op-grid\"><div class=\"norm-item\"><div class=\"norm-num\">1</div><div><strong>Properly Installed</strong> — per applicable codes and manufacturer's instructions. Any deviation from proper installation fails this.</div></div><div class=\"norm-item\"><div class=\"norm-num\">2</div><div><strong>Properly Maintained</strong> — per manufacturer's recommendations. Missed maintenance cycles or overdue inspections fail this.</div></div><div class=\"norm-item\"><div class=\"norm-num\">3</div><div><strong>Fully Enclosed</strong> — no covers missing, all conductors enclosed. A single missing panel fails this.</div></div><div class=\"norm-item\"><div class=\"norm-num\">4</div><div><strong>Doors Closed and Secured</strong> — closed AND latched. Propped open or unlatched does not meet this condition.</div></div><div class=\"norm-item\"><div class=\"norm-num\">5</div><div><strong>No Evidence of Impending Failure</strong> — no damage, loose parts, arcing sounds, overheating, burning smell. If anything seems wrong — this fails.</div></div><div class=\"norm-item\"><div class=\"norm-num\">6</div><div><strong>Properly Rated Devices</strong> — all circuit breakers and switches used within intended rating and application.</div></div></div><div class=\"warn-box\">ANY ONE condition failing = not Normal Operation = both hazards present, even if the system runs perfectly. One failure immediately escalates to Level 3.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-emergency-bed\"></i>Critical Scenario — e-STOP</div><div class=\"img-wrap\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAGhAawDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD2aiiigAooooAKKKSgBaSmySpEheRgqjkknGK5fVPiFo2nMyRyG5de0fI/PpUSnGO7N6OHq15ctOLZ1VFeZXHxWnLf6PYKF/2zUUXxUvt37yyhI9ic/wA6x+tUu56ayLHNX5D1Klrg7D4o6fMwW7t5ID/eHIrrtP1Wz1OIS2lwkoP905xWsKsJ7M4MRgsRh/4sGi9RSUtaHIFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAlFDMFBLHAFc3q3jnR9KcxtOJpB/DH838qmU4x3ZtSoVKz5acbs6SlrzS5+Krkn7LYADt5h/wqqvxT1ENlrKAj0yf8ax+s0u56ccjxzV+Q9VpK8/sfipayMFvLR4vVlORXX6Zr2navGHs7lJDjlc8j6itIVYT2Zx4jAYnD/xINGlRSClrQ4gooooAKKKKACiiigAooooAKztZ1q00Sza5u5AqgcDux9BSa1rVroli91dOAB91e7H0FeMeIPEF1r98087ERjiOPPCj/GuevXVNeZ7OV5XPGzu9ILdlnxD4w1DXbhvnMNtn5YlP86wCSetBpK8ic5Td2fotDD0qEFCmrIKKKKg3Cren6peaXcLPZztG6+h4NVKKE2ndEzhGceWSuj2Dwh42h1tBa3ZEV2o6Z4f3FdfXzpBPLbTLLC5R0OVYHoa9a8GeNI9YhWzvXCXijAz/HXq4fE8/uy3Pg84yZ0G61Fe71XY7Kikpa7T5gKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKrX19b6davc3MgjjQZJNF/fW+nWr3NzKI40GSTXjfivxXceILoorFLRD8iZ6+5rCtWVNeZ6mW5bUxtSy0it2WfE/jm81eZ4LR2gtOmAeX+tcoSSck5J7mkorx5zlN3Z+kYbCUsNBQpqwtFJRUHSLU1tdz2kqy28rROpyGU4qCihNrYmUFJWkrnqXhDx8t86WGpkJP l 6 conditions must be simultaneously true.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Why is checking status after an e-STOP a Level 3 task on an enclosed system? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Because the system state is unknown. An e-STOP removes drive signals but does not guarantee de-energization. Stored energy may remain. The system must be treated as energized until a Level 3 Qualified person independently verifies voltage-free.</div></div></div>";

O06XVbRLzfIn2dplD7jK2Bt65ORXO6FFJO+ny3GoaZa61/aR85j5hvWcSHfGwB+6VyORtAwa9NiudLleExT2jtMT5W10Jcjrtx1x7Va8mMSmXy18wjBfAzj60AeTX99aNMurwfYbO6XWV35eSS8jVZwjmRicIhX+EjaFIFX5202x8RveLLp+rvLqo4ErxahA7OBtUZ+dF9OAV9RXpJghJcmJMvwx2j5vr60z/RPtm39z9pCbscb9vTPrjtQBy/w/gsLWPWYLZII7hNUuRMiYDKvmNsyOuMdPauvpoRFZmVQGb7xA5NOoAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAawyK43x14f/tHTjcwJm4tssuOrL3H9a7SoZ4w6mplFSVmbUK86FWNSG6Pn6pbeB7mdYk6sfyrd8ZaEdI1UyxJi2uSWXHRW7j+tTeHtIdUWeRcPKMjPZa86FFupys+5xOZU4YNV4by29f8AgdTc0PTVRURVwqjArtrK3EaDis7SbIRoDitxF2jFensfAtuTbe4tLRRQIKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAMbxbrE+g+GbzUbaMSTxhVjVgSNzMFBIHXBbOO9ctd6jr1xpmsWcx1E2p0qaT7XdWCwNHIo5QY4IZSe2Rjqa7q+sbXU7GayvYVmt50KSRt0YGsy38K2EMd0ss97dG6tzbM9zdPIViPVVz0+vX3oA4O28/w7eLqvni5/s/wwtzFCbeNRyWwuQMgZ5JHJratfEniCzP2i4t7+8tlsZprhrmxFusUiJvXYR1VsFcHJ6HNdSvh3TFk3mDfmxFgyuxKtCM/KR36nmobDwrp9hIH8y7uVSIwxR3Vy0qRRngqqk4xgAc5OB1oAw7k+I28Jz6jLrcTrcaXJM6LbqjQvs3DyyOq4yDuyehBqiNS1qxtYo7OaO4ubfw9Heh5IV3yYkBZM+6Age/PWultfBej2pI23E8Yge3ijnuHkWCJhhkQE/KCAB64GKs6Z4bsNKlilhM8skNr9lV55S58rduCnPXH8qAOb1nxneImoX2klZLO2tbZEzFuLTzspU8cnajKcdywFaPhzU9Zn1mW0u4r+WyNv5i3N5Zi3ZZA2Cny8EEHI4yMHk1oWvhPRbTRJ9GjtM2VwzNJGzE5Jx36jGBj0wMdKl0zQbbTLiS5W4u7md0Efm3Vw0rBAchRngDP4nvQBqUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUhGaWigDJ1jR7bVLfyLmISIGDAehBqtFpSrJnaK3iAaTYvpSsU5NpRvoiKCIRqBip6SlpkhRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAf/2Q==\" alt=\"Complete hazard control hierarchy for Level 3 energized work\"><div class=\"img-caption\">Complete hazard control hierarchy for Level 3 energized work</div></div><p>At Level 3, hazard control analysis must be documented as part of every Risk Assessment. You must assess each technique, determine whether it is applicable, apply it if possible, and document its specific impact on remaining hazards.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-circle-check\"></i>Elimination</div><p>Can the task be performed without any voltage, or with voltage below 50V?</p><div class=\"impact-card green\"><div class=\"impact-title\">Impact of Successful Elimination</div><div class=\"rule-list\" style=\"margin:0\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>No HV means no electrical hazard present</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>No PPE required after system is confirmed voltage-free*</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Rest of hazard control techniques can be skipped</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Follow the 5 Safety Rules to de-energize</div></div></div><p style=\"font-size:12px;color:var(--gray);margin-top:10px\">*PPE may still be required if within arc flash boundary of a separate nearby energized system</p></div><p>Elimination is the <strong>only</strong> control after which remaining techniques can be skipped. All others leave HV hazard present.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-arrows-exchange\"></i>Substitution</div><p>Can the task be performed at a lower HV voltage closer to 50V?</p><div class=\"impact-card yellow\"><div class=\"impact-title\">Impact of Successful Substitution</div><div class=\"rule-list\" style=\"margin:0\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Incident energy reduced, PPE category may be reduced</div></div></div><div class=\"warn-box\" style=\"margin-top:8px;margin-bottom:0\"><strong>HV hazard still present. Remaining techniques cannot be skipped.</strong></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-settings\"></i>Engineering Controls — Impact by Type</div><div class=\"eng-controls-grid\"><div class=\"eng-card\"><div class=\"eng-type\">Insulation Cover</div><div class=\"eng-impact\">Eliminates electric shock hazard only. Does NOT protect against arc flash. Arc flash PPE still required.</div></div><div class=\"eng-card\"><div class=\"eng-type\">Arc Reducing Circuit Breaker</div><div class=\"eng-impact\">Reduces fault current and clearance time. Lower incident energy. PPE category may be reduced as a result.</div></div><div class=\"eng-card\"><div class=\"eng-type\">Remote Operation</div><div class=\"eng-impact\">Removes the individual from the hazard zone entirely — the most effective engineering control.</div></div></div><div class=\"warn-box\">After any engineering control: HV hazard still present. Remaining techniques cannot be skipped.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-clipboard\"></i>Administrative Controls</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Unauthorized persons kept away through badge access and qualification requirements</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Only Level 3 Qualified persons perform Level 3 tasks</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Risk Assessment completed and peer-reviewed before work begins</div></div></div><div class=\"warn-box\">After administrative controls: HV hazard still present. Remaining techniques cannot be skipped.</div></div><div class=\"knowledge-check\" data-id=\"l3c2\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">After applying an insulation cover to energized terminals, can you remove arc flash PPE? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. An insulation cover only eliminates shock hazard. Arc flash hazard remains. Arc flash PPE must continue to be worn inside approach boundaries.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">After Elimination, can you skip remaining hazard controls? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Yes — Elimination is the only technique after which remaining controls can be skipped. All others leave HV hazard present.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">How does an arc reducing circuit breaker lower arc flash hazard? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">It reduces fault current and fault clearance time. Lower fault current + faster clearance = lower arc flash incident energy. A lower incident energy may allow a reduced PPE category.</div></div></div>";
CHAPTERS["l3c3"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-flame\"></i>Why Perform an Arc Flash Study?</div><p>An arc flash study is required before Level 3 energized HV work. It is part of the Risk Assessment process and must be completed before work begins. It answers three questions: What is the worst-case arc flash hazard for this system? What is the arc flash boundary at my working distance? What PPE category is required?</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-math\"></i>Two Study Methods — Use One, Not Both</div><div class=\"warn-box\">Use EITHER the PPE Category Method OR the Incident Energy Method. Using both is not permitted under NFPA 70E.</div><div class=\"method-cards\"><div class=\"method-card\"><div class=\"method-title\">PPE Category Method</div><p><strong>Inputs:</strong> Nominal voltage + fault current + fault clearing time<br><strong>Process:</strong> NFPA 70E Table 130.7(C)(15)(a) or (b)<br><strong>Outputs:</strong> PPE category + arc flash boundary<br>Best for standard AC systems within the table scope.</p></div><div class=\"method-card\"><div class=\"method-title\">Incident Energy Method</div><p><strong>Inputs:</strong> Voltage + fault current + clearing time + working distance + conductor spacing + enclosure size<br><strong>Process:</strong> IEEE 1584-2018 compliant calculator<br><strong>Outputs:</strong> Incident energy (cal/cm2) + arc flash boundary + PPE category<br>More comprehensive; used for non-standard systems.</p></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-battery\"></i>DC Arc Flash — Critical for Archer</div><p>IEEE 1584 is based entirely on AC systems and cannot be applied to DC arc flash calculations. NFPA 70E still requires arc flash risk assessment for DC but does not prescribe a single calculation method. For Archer's DC battery systems, the <strong>Modified Lee Method</strong> can be applied:</p><div class=\"formula-box\"><div class=\"formula-title\">Modified Lee Method for DC Arc Flash</div><div class=\"formula\">E (cal/cm2) = V x Isc x t / (4pi x d2 x 4.184)</div><div class=\"formula-note\">V = voltage, Isc = short circuit current, t = fault clearance time (s), d = distance in cm<br>Source: IEEE Transactions on Industry Applications, Vol. 46, No. 6, pp. 2299-2302, Nov./Dec. 2010</div></div><div class=\"info-box\"><strong>Arc flash incident energy vs. thermal runaway energy — not the same:</strong><br>Arc flash incident energy = thermal energy reaching a worker during an electrical fault (determines PPE category).<br>Thermal runaway energy = total energy released when a battery fails chemically.<br>Do not use thermal runaway energy for PPE selection.</div></div><div class=\"section-block\" style=\"background:var(--sand-light);border:1px solid var(--sand);border-left:3px solid var(--black)\"><div class=\"section-title\" style=\"margin-bottom:10px\">Additional Reading</div><p style=\"font-size:13px;color:var(--gray);margin-bottom:14px\">The DC arc flash calculation method used at Archer is based on peer-reviewed IEEE research. The full methodology, arc resistance models, and case studies are summarized in the reference page below.</p><a href=\"arcflash-reference.html\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:1.5px solid var(--black);border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;background:var(--black);color:var(--white);text-decoration:none\">DC Arc Flash Reference Page</a></div><div class=\"knowledge-check\" data-id=\"l3c3\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Can you use both arc flash study methods on the same system? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. NFPA 70E requires either the PPE Category Method or the Incident Energy Method — not both.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Why can't IEEE 1584 be used for Archer's DC battery systems? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">IEEE 1584 is based on AC systems and cannot be directly applied to DC arc flash calculations. For DC systems, use the Modified Lee Method.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the difference between arc flash incident energy and thermal runaway energy? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Arc flash incident energy is thermal energy reaching a worker during an electrical fault — this is used to select PPE. Thermal runaway energy is total energy released when a battery fails chemically. Completely different phenomena, must not be confused.</div></div></div>";
CHAPTERS["l3c4"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-file-text\"></i>Required Paperwork for Level 3 Energized Work</div><p>NFPA 70E requires two formal documents before any hands-on energized HV electrical work. Both are required. Neither can be skipped.</p><div class=\"doc-cards\"><div class=\"doc-card\"><div class=\"doc-icon\"><i class=\"ti ti-clipboard-check\"></i></div><div class=\"doc-title\">Risk Assessment</div><div class=\"doc-body\">Determines: worst-case hazards after all hazard controls applied, maximum operating voltages, arc flash incident energy at working distance, all approach boundaries, and PPE category. Completed on Archer's Risk Assessment form. Must be reviewed by a second Level 3 Qualified person before work begins.</div></div><div class=\"doc-card\"><div class=\"doc-icon\"><i class=\"ti ti-file-certificate\"></i></div><div class=\"doc-title\">Energized Electrical Work Permit (EEWP)</div><div class=\"doc-body\">Formal work permit authorizing specific energized electrical work. Required in most Level 3 scenarios. Has three specific exemptions. Must contain all 7 required elements to be valid.</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-clipboard-check\"></i>Risk Assessment Requirements</div><div class=\"warn-box\"><strong>The Risk Assessment must be reviewed by another Level 3 Qualified person before work begins.</strong><br>Self-review is not sufficient. The peer review exists because a second set of eyes on a safety-critical document catches errors the author may miss. This is a hard requirement — not a formality.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-list\"></i>7 Required EEWP Elements</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon num\">1</div><div>Description of the equipment to be worked on</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">2</div><div>Description of the work to be performed</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">3</div><div>Justification explaining why energized work must be performed — why it cannot be done de-energized</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">4</div><div>Description of all safe work practices to be employed during the task</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">5</div><div>Results of the Risk Assessment</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">6</div><div>Description of means employed to keep unqualified persons out of the work area</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">7</div><div>Signature of person(s) authorizing the work to be performed</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-circle-x\"></i>EEWP Exemptions</div><div class=\"exemption-cards\"><div class=\"exemption-card\"><i class=\"ti ti-flask\"></i><div>Testing</div></div><div class=\"exemption-card\"><i class=\"ti ti-search\"></i><div>Troubleshooting</div></div><div class=\"exemption-card\"><i class=\"ti ti-meter\"></i><div>Voltage or Current Measuring</div></div></div><div class=\"info-box\"><strong>EEWP exemptions do NOT bypass all safety requirements.</strong> PPE, approach boundaries, barriers, buddy system, and the Risk Assessment still apply to all three exempted activities. Only the EEWP permit itself is exempt.</div></div><div class=\"knowledge-check\" data-id=\"l3c4\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">List the three EEWP exemptions. <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Testing, Troubleshooting, and Voltage or Current Measuring.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Can you review your own Risk Assessment before starting Level 3 work? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. Another Level 3 Qualified person must review it before work begins. Self-review is not sufficient.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is element 3 of a required EEWP? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Justification explaining why the work must be performed in an energized state — specifically why it cannot be de-energized first.</div></div></div>";

 work\"><div class=\"img-caption\">The 6 Safety Rules hierarchy and sequence for Level 3 energized work</div></div></div><div class=\"section-block\"><div class=\"six-rules-list\"><div class=\"six-rule\"><div class=\"six-rule-header\"><div class=\"six-num\">1</div><div class=\"six-title\">Implement Hazard Control Techniques</div></div><p>Apply all applicable controls: elimination, substitution, engineering, administrative. Document what was applied and the specific impact of each on remaining hazard level. This documentation becomes part of your Risk Assessment.</p></div><div class=\"six-rule\"><div class=\"six-rule-header\"><div class=\"six-num\">2</div><div class=\"six-title\">Perform Risk Assessment</div></div><p>Complete Archer's Risk Assessment form for the specific setup. Answer all questions. Determine worst-case hazards, maximum voltages, incident energy, all approach boundaries, and PPE category.</p><div class=\"warn-box\"><strong>Get the Risk Assessment reviewed by another Level 3 Qualified person before proceeding to any other step.</strong> This peer review is mandatory and cannot be completed after work begins.</div></div><div class=\"six-rule\"><div class=\"six-rule-header\"><div class=\"six-num\">3</div><div class=\"six-title\">Determine Approach Boundaries and PPE Category</div></div><div class=\"img-wrap\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAGwArwDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiM 63/ftaKKADyLn/n9b/v2tHkXP/P63/ftaKKADyLn/n9b/v2tHkXP/P63/ftaKKADyLn/AJ/W/wC/a0eRc/8AP63/AH7WiigA8i5/5/W/79rR5Fz/AM/rf9+1oooAPIuf+f1v+/a0eRc/8/rf9+1oooAPIuf+f1v+/a0eRc/8/rf9+1oooAPIuf8An9b/AL9rUaWM6TSSi9bdJjd+7XtRRQBJ5Fz/AM/rf9+1o8i5/wCf1v8Av2tFFAB5Fz/z+t/37WjyLn/n9b/v2tFFAB5Fz/z+t/37WjyLn/n9b/v2tFFAB5Fz/wA/rf8AftaPIuf+f1v+/a0UUAHkXP8Az+t/37WjyLn/AJ/W/wC/a0UUAHkXP/P63/ftaPIuf+f1v+/a0UUAHkXP/P63/ftaPIuf+f1v+/a0UUAHkXP/AD+t/wB+1o8i5/5/W/79rRRQAeRc/wDP63/ftaPIuf8An9b/AL9rRRQAeRc/8/rf9+1o8i5/5/W/79rRRQAeRc/8/rf9+1p9rb/Zo2UyGQs7OWIA5Jz2oooA/9k=\" alt=\"PPE category selection based on arc flash study results\"><div class=\"img-caption\">PPE category selection based on arc flash study results</div></div><p>Use arc flash study results to establish all three approach boundaries and select the correct PPE category. Confirm all workers understand the boundaries and their PPE requirements before anyone enters the work area.</p></div><div class=\"six-rule\"><div class=\"six-rule-header\"><div class=\"six-num\">4</div><div class=\"six-title\">Complete EEWP if Applicable</div></div><p>Required when hands-on work is within the Restricted Approach boundary OR conductors are energized at 50V or more. Exemptions: Testing, Troubleshooting, Voltage or Current Measuring — but all other safety requirements still apply to these activities.</p></div><div class=\"six-rule\"><div class=\"six-rule-header\"><div class=\"six-num\">5</div><div class=\"six-title\">Erect Barriers</div></div><p>Barriers at greater of: limited approach OR arc flash boundary. Post arc flash warning signs.</p><div class=\"warn-box\"><strong>Unqualified persons are NOT permitted inside the arc flash boundary during energized work — not even with an escort.</strong> During active Level 3 work, the arc flash boundary is an absolute exclusion zone for anyone without required PPE and qualification.</div></div><div class=\"six-rule\"><div class=\"six-rule-header\"><div class=\"six-num\">6</div><div class=\"six-title\">Always Wear PPE When Performing the Work</div></div><div class=\"warn-box\"><strong>PPE must not be removed at any point while performing energized work inside approach boundaries.</strong> Not during breaks, not to adjust something, not for any reason. To remove PPE, exit the approach boundary area first. Re-equip completely before re-entering.</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-alert-triangle\"></i>Level 3 Task Rules and Alerting Techniques</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon red\"><i class=\"ti ti-x\"></i></div><div><strong>Remove ALL jewelry before Level 3 work. No exceptions.</strong> Metal jewelry can conduct current, cause short circuits, and become dangerously hot during an arc flash event.</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Cover exposed energized terminals with insulating cover (shock protection only — arc flash PPE still required)</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Work outside approach boundaries whenever possible — minimize time inside to what is strictly necessary</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-users\"></i></div><div><strong>Safety attendant required</strong> — Level 3 requires both the buddy system AND a dedicated safety attendant. The safety attendant is specifically designated to monitor and respond to emergencies — a separate role from the buddy.</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Arc flash warning labels on all HV equipment per NFPA 70E. Hazard light ON only when energized.</div></div></div></div><div class=\"knowledge-check\" data-id=\"l3c5\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">List the 6 Safety Rules in order. <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">1) Implement hazard controls. 2) Perform Risk Assessment (peer reviewed). 3) Determine boundaries and PPE category. 4) Complete EEWP if applicable. 5) Erect barriers. 6) Always wear PPE while performing the work.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">You need to briefly adjust your gloves during energized work inside the arc flash boundary. What do you do? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Exit the approach boundary area entirely before removing any PPE. Adjust your gloves outside. Re-equip completely before re-entering the work area.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What supervision requirements apply to Level 3 that differ from Level 2? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Level 3 requires both the buddy system AND a dedicated safety attendant. The safety attendant is a specifically designated monitor and emergency responder — a separate role from the buddy.</div></div></div>";

// ── COURSE STRUCTURE ─────────────────────────────────────────────
const COURSES = [

// ── STATE ────────────────────────────────────────────────────────
var progress = {};
COURSES.forEach(function(c){ c.chapters.forEach(function(ch){ progress[ch.id] = false; }); });
var currentCourse = null, currentChapter = null, quizState = null;

function shuffle(a){ return a.slice().sort(function(){ return Math.random()-.5; }); }
function pct(cid){
  var c = COURSES.find(function(x){ return x.id===cid; });
  return Math.round(c.chapters.filter(function(ch){ return progress[ch.id]; }).length / c.chapters.length * 100);

// ── KNOWLEDGE CHECK ───────────────────────────────────────────────
function toggleKC(el){
  var item = el.closest('.kc-item');
  var ans = item.querySelector('.kc-a');
  var isOpen = el.classList.contains('open');
  el.classList.toggle('open');
  ans.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    var kc = el.closest('.knowledge-check');
    var chId = kc.dataset.id;
    var allOpen = Array.from(kc.querySelectorAll('.kc-q')).every(function(q){ return q.classList.contains('open'); });
    if(allOpen){
      var btn = document.getElementById('complete-btn');
      var msg = document.getElementById('locked-msg');
      var done = document.getElementById('kc-done-msg');
      if(btn){ btn.disabled = false; btn.style.opacity = '1'; }
      if(msg){ msg.style.display = 'none'; }
      if(done){ done.style.display = 'block'; }
    }
  }
}

// ── SIDEBAR ──────────────────────────────────────────────────────
function renderSidebar(){
  var html = '<div class="s-section">Courses</div>';
  COURSES.forEach(function(c){
    var p = pct(c.id);
    var active = currentCourse && currentCourse.id === c.id;
    html += '<div class="s-course'+(active?' active':'')+'" onclick="openCourse(\''+c.id+'\')">';
    html += '<div class="s-course-name">'+c.title+'</div>';
    html += '<div class="s-course-prog">'+p+'% complete</div>';
    html += '<div class="prog-mini"><div class="prog-mini-fill" style="width:'+p+'%"></div></div>';
    html += '</div>';
    if(active && currentCourse){
      currentCourse.chapters.forEach(function(ch){
        var done = progress[ch.id];
        var ach = currentChapter && currentChapter.id === ch.id;
        var icon = done ? 'circle-check' : ach ? 'circle-dot' : 'circle';
        html += '<div class="s-chapter'+(ach?' active':'')+(done?' done':'')+'" onclick="openChapter(\''+ch.id+'\')">';
        html += '<i class="ti ti-'+icon+'"></i>'+ch.title+'</div>';
      });
      if(p===100){
        html += '<div class="s-chapter" onclick="startQuiz(\''+c.id+'\')" style="color:var(--red)">';
        html += '<i class="ti ti-pencil" style="color:var(--red)"></i>Take Quiz</div>';
      }
    }
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

// ── HOME ─────────────────────────────────────────────────────────
function showHome(){
  currentCourse = null; currentChapter = null; quizState = null;
  document.getElementById('topbar-title').textContent = 'HV Safety Training';
  document.getElementById('topbar-sub').textContent = 'Select a course to begin';

    return '<div class="ccard" onclick="openCourse(\''+c.id+'\')">'

    +'<div style="margin-top:12px"><a href="faq.html" target="_blank" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:1.5px solid var(--sand);border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;background:var(--white);color:var(--black);text-decoration:none">Archer EHS FAQ</a></div>'
    +'<div class="course-cards">'+cards+'</div>';

}

// ── OPEN COURSE ───────────────────────────────────────────────────
function openCourse(cid){
  currentCourse = COURSES.find(function(c){ return c.id===cid; });
  quizState = null;
  var first = currentCourse.chapters.find(function(ch){ return !progress[ch.id]; }) || currentCourse.chapters[0];
  openChapter(first.id);
}

// ── OPEN CHAPTER ──────────────────────────────────────────────────
function openChapter(chid){
  var c = COURSES.find(function(c){ return c.chapters.some(function(ch){ return ch.id===chid; }); });
  var ch = c.chapters.find(function(x){ return x.id===chid; });
  currentCourse = c; currentChapter = ch; quizState = null;
  var idx = c.chapters.indexOf(ch);
  var isLast = idx === c.chapters.length - 1;
  var allDone = c.chapters.every(function(x){ return progress[x.id]; });

  document.getElementById('topbar-title').textContent = c.title;
  document.getElementById('topbar-sub').textContent = 'Chapter '+(idx+1)+' of '+c.chapters.length+' — '+ch.title;

  var chContent = CHAPTERS[ch.id] || '<p>Content not found.</p>';
  var hasKC = chContent.indexOf('knowledge-check') > -1;
  var locked = hasKC && !progress[ch.id];

  var prevBtn = idx > 0
    ? '<button class="btn ghost" onclick="openChapter(\''+c.chapters[idx-1].id+'\')"><i class="ti ti-arrow-left"></i> Previous</button>'
    : '<button class="btn ghost" onclick="showHome()"><i class="ti ti-home"></i> All courses</button>';

  var nextBtn;
  if(!isLast){
    nextBtn = '<button class="btn" id="complete-btn"'+(locked?' disabled style="opacity:.4"':'')+' onclick="markDone(\''+ch.id+'\',\''+c.chapters[idx+1].id+'\')">Mark complete &amp; continue <i class="ti ti-arrow-right"></i></button>';
  } else if(!allDone){
    nextBtn = '<button class="btn red" id="complete-btn"'+(locked?' disabled style="opacity:.4"':'')+' onclick="markDone(\''+ch.id+'\',null)">Mark complete <i class="ti ti-check"></i></button>';
  } else {
    nextBtn = '<button class="btn red big" onclick="startQuiz(\''+c.id+'\')"><i class="ti ti-pencil"></i> All chapters done — Take Quiz</button>';
  }
  var lockedMsg = locked ? '<div id="locked-msg" style="font-size:11px;color:var(--red);margin-top:8px;text-align:center">Reveal all knowledge check answers to continue</div>' : '';

  var header = '<div class="chapter-header">'
    +'<div class="chapter-eyebrow">'+c.level+' · Chapter '+(idx+1)+' of '+c.chapters.length+'</div>'
    +'<div class="chapter-title">'+ch.title+'</div>'
    +'<div class="chapter-meta">'
    +(progress[ch.id]?'<span style="color:green"><i class="ti ti-circle-check"></i> Completed</span>':'<span><i class="ti ti-circle"></i> In progress</span>')
    +'<span><i class="ti ti-book-2"></i> '+c.title+'</span>'
    +'<span><i class="ti ti-list-check"></i> '+c.chapters.filter(function(x){ return progress[x.id]; }).length+'/'+c.chapters.length+' done</span>'
    +'</div></div>';

  var nav = '<div id="kc-done-msg" class="kc-complete-msg" style="display:none"><i class="ti ti-circle-check" style="color:green;margin-right:6px"></i>All answers revealed — you may continue</div>'
    +'<div class="chapter-nav">'+prevBtn+'<div style="text-align:center">'+nextBtn+lockedMsg+'</div></div>';

  // KEY: set header+nav via innerHTML first, then inject chapter body separately
  // This avoids embedding large base64 image strings inside a JS string concatenation
  var wrapper = document.getElementById('content');
  wrapper.innerHTML = header + '<div id="ch-body"></div>' + nav;
  document.getElementById('ch-body').innerHTML = chContent;

  if(progress[ch.id]){
    var btn = document.getElementById('complete-btn');
    if(btn) btn.disabled = false;
  }
  renderSidebar();
}

// ── MARK DONE ────────────────────────────────────────────────────
function markDone(chid, nextId){
  progress[chid] = true;
  if(nextId) openChapter(nextId);
  else openChapter(chid);
}

// ── QUIZ ─────────────────────────────────────────────────────────
function startQuiz(cid){
  var c = COURSES.find(function(x){ return x.id===cid; });
  if(pct(cid)<100){ alert('Complete all chapters first.'); return; }
  currentCourse = c; currentChapter = null;
  var lv = {l1:1,l2:2,l3:3}[cid];
  var pool = ALL_Q.filter(function(q){ return q.lv===lv; });
  var qs = shuffle(pool).slice(0, Math.min(20, pool.length));
  quizState = {cid:cid,qs:qs,current:0,answers:new Array(qs.length).fill(null),secs:1800,interval:null};
  quizState.interval = setInterval(function(){
    quizState.secs--;
    var el = document.getElementById('qtimer');
    if(el){
      var m=Math.floor(quizState.secs/60), s=quizState.secs%60;
      el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
      el.closest('.timer').className = 'timer'+(quizState.secs<300?' urgent':'');
    }
    if(quizState.secs<=0){ clearInterval(quizState.interval); submitQuiz(true); }
  },1000);
  renderQuiz();
  renderSidebar();
}

function renderQuiz(){
  var qs=quizState.qs, cur=quizState.current, answers=quizState.answers;
  var q=qs[cur];
  var letters=['A','B','C','D'];
  var answered=answers.filter(function(a){ return a!==null; }).length;
  var m=Math.floor(quizState.secs/60), s=quizState.secs%60;
  var dots=qs.map(function(_,i){
    var bg=i===cur?'var(--black)':answers[i]!==null?'var(--sand)':'transparent';
    var border=i===cur?'var(--black)':'var(--sand)';
    var color=i===cur?'var(--white)':'var(--black)';
    return '<div onclick="quizState.current='+i+';renderQuiz()" style="width:26px;height:26px;border:1.5px solid '+border+';background:'+bg+';color:'+color+';border-radius:2px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;margin:2px">'+(i+1)+'</div>';
  }).join('');
  var lvCls=['','ql1','ql2','ql3'][q.lv];
  var opts=q.opts.map(function(o,i){
    return '<div class="opt'+(answers[cur]===i?' sel':'')+'" onclick="selectOpt('+i+')">'
      +'<div class="opt-letter">'+letters[i]+'</div><span>'+o+'</span></div>';
  }).join('');
  document.getElementById('topbar-title').textContent = currentCourse.title+' Quiz';
  document.getElementById('topbar-sub').textContent = answered+' of '+qs.length+' answered · 80% to pass';
  var isLast = cur===qs.length-1;
  document.getElementById('content').innerHTML =
    '<div class="quiz-wrap">'
    +'<div class="q-header">'
    +'<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em">'+answered+' of '+qs.length+' answered</div>'
    +'<div class="timer"><i class="ti ti-clock"></i><span id="qtimer">'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'</span></div>'
    +'</div>'
    +'<div class="q-prog-bar"><div class="q-prog-fill" style="width:'+Math.round(cur/qs.length*100)+'%"></div></div>'
    +'<div style="margin-bottom:16px;line-height:2">'+dots+'</div>'
    +'<div class="section-block">'
    +'<span class="q-level '+lvCls+'">Level '+q.lv+'</span>'
    +'<div class="q-counter">Question '+(cur+1)+' of '+qs.length+'</div>'
    +'<div class="q-text">'+q.q+'</div>'
    +opts
    +'<div style="display:flex;justify-content:space-between;margin-top:20px">'
    +'<button class="btn ghost" onclick="quizState.current=Math.max(0,quizState.current-1);renderQuiz()"'+(cur===0?' disabled style="opacity:.3"':'')+'>Back</button>'
    +(isLast?'<button class="btn red" onclick="submitQuiz(false)"><i class="ti ti-send"></i> Submit</button>':'<button class="btn" onclick="quizState.current++;renderQuiz()">Next</button>')
    +'</div></div></div>';
}

function selectOpt(i){ quizState.answers[quizState.current]=i; renderQuiz(); }

function submitQuiz(expired){
  clearInterval(quizState.interval);
  var qs=quizState.qs, answers=quizState.answers;
  var correct=0;
  qs.forEach(function(q,i){ if(answers[i]===q.c) correct++; });
  var total=qs.length, score=Math.round(correct/total*100);
  var passed=score>=80&&!expired;
  var barColor=passed?'#006600':'var(--red)';
  var review=qs.map(function(q,i){
    var ua=answers[i]; var right=ua===q.c;
    var letters=['A','B','C','D'];
    var opts=q.opts.map(function(o,oi){
      if(oi===q.c) return '<div class="review-ans correct"><i class="ti ti-check"></i>'+letters[oi]+'. '+o+'</div>';
      if(oi===ua&&!right) return '<div class="review-ans wrong"><i class="ti ti-x"></i>'+letters[oi]+'. '+o+'</div>';
      return '';
    }).filter(Boolean).join('');
    var lvCls=['','ql1','ql2','ql3'][q.lv];
    return '<div class="review-item '+(right?'pass':'fail')+'">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<span class="q-level '+lvCls+'" style="font-size:9px">Level '+q.lv+'</span>'
      +'<i class="ti ti-'+(right?'circle-check':'circle-x')+'" style="color:'+(right?'#006600':'var(--red)')+'"></i>'
      +'<span style="font-size:11px;color:var(--gray)">Q'+(i+1)+'</span></div>'
      +'<div class="review-q">'+q.q+'</div>'+opts
      +(ua===null?'<div style="font-size:12px;color:var(--gray);margin-top:4px">Not answered</div>':'')
      +'</div>';
  }).join('');
  document.getElementById('topbar-title').textContent = 'Quiz Results';
  document.getElementById('topbar-sub').textContent = currentCourse.title+' · '+(passed?'Passed':'Failed');
  document.getElementById('content').innerHTML =
    '<div class="section-block"><div class="result-hero">'
    +'<div class="result-score" style="color:'+barColor+'">'+score+'%</div>'
    +'<div class="result-label">'+(expired?'Time expired':passed?'Passed':'Failed')+'</div>'
    +'<div class="result-bar"><div class="result-bar-fill" style="width:'+score+'%;background:'+barColor+'"></div></div>'
    +'<div style="font-size:12px;color:var(--gray)">'+correct+' of '+total+' correct · Pass: 80%</div>'
    +'</div>'
    +'<div class="result-stats">'
    +'<div class="rstat"><div class="rstat-val" style="color:'+barColor+'">'+score+'%</div><div class="rstat-label">Score</div></div>'
    +'<div class="rstat"><div class="rstat-val">'+correct+'</div><div class="rstat-label">Correct</div></div>'
    +'<div class="rstat"><div class="rstat-val">'+(total-correct)+'</div><div class="rstat-label">Incorrect</div></div>'
    +'</div>'
    +(passed?'<div class="info-box"><strong>Congratulations.</strong> Your manager will be notified to review your qualification.</div>':'<div class="warn-box"><strong>Retake the full course before attempting the quiz again.</strong></div>')
    +'<div style="display:flex;gap:10px;margin-bottom:24px">'
    +'<button class="btn ghost" onclick="openCourse(\''+currentCourse.id+'\')"><i class="ti ti-book-2"></i> Review course</button>'
    +'<button class="btn ghost" onclick="showHome()"><i class="ti ti-home"></i> All courses</button></div>'
    +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:12px">Question review</div>'
    +review+'</div>';
  quizState = null;
  renderSidebar();
}

showHome();
</script>

// ── GET PAGE TEXT ─────────────────────────────────────────────────
// Extracts readable text from the current visible content,
// skipping nav, buttons, icons, and UI chrome.
function getPageText() {
  // Priority targets per page type
  const targets = [
    document.getElementById('ch-body'),        // courses.html chapter body
    document.getElementById('content'),         // courses.html home/quiz
    document.querySelector('.scenario-slide'),  // scenarios.html
    document.querySelector('.role-view.active .content'), // portal views
    document.querySelector('main'),
    document.body
  ];

  for (const el of targets) {
    if (!el) continue;

    // Clone to avoid mutating DOM
    const clone = el.cloneNode(true);

    // Remove unwanted elements
    const remove = clone.querySelectorAll(
      'button, .btn, nav, .sidebar, .topbar, .chapter-nav, ' +
      '.kc-q, i, svg, .badge, .s-item, .s-logo, .timer, ' +
      '.q-prog-bar, .opt-letter, script, style, .img-wrap, ' +
      '.img-caption, .quiz-wrap .opt' // skip quiz answer options
    );
    remove.forEach(r => r.remove());

    const text = clone.innerText || clone.textContent || '';
    const cleaned = text
      .replace(/\s+/g, ' ')
      .replace(/[^\w\s.,;:!?'"-]/g, ' ')
      .trim();

    if (cleaned.length > 50) {
      // Cap at ~3000 chars to stay within free tier limits per read
      return cleaned.slice(0, 3000) + (cleaned.length > 3000 ? '...' : '');
    }
  }
  return 'No readable content found on this page.';
}

// ── ELEVENLABS API CALL ───────────────────────────────────────────
async function fetchElevenLabsAudio(text) {
  if (ELEVEN_API_KEY === 'YOUR_API_KEY_HERE') {
    showNoKeyNotice();
    return null;
  }

  ttsState.abortController = new AbortController();

  const response = await fetch(
    `https://api.elevenlabs.io/v1/text-to-speech/${ELEVEN_VOICE_ID}`,
    {
      method: 'POST',
      headers: {
        'xi-api-key': ELEVEN_API_KEY,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text: text,
        model_id: ELEVEN_MODEL,
        voice_settings: {
          stability: 0.5,
          similarity_boost: 0.75,
          style: 0.0,
          use_speaker_boost: true
        }
      }),
      signal: ttsState.abortController.signal
    }
  );

  if (!response.ok) {
    const err = await response.text();
    console.error('ElevenLabs error:', err);
    throw new Error('ElevenLabs API error: ' + response.status);
  }

  const blob = await response.blob();
  return URL.createObjectURL(blob);
}

// ── TOGGLE PLAY/PAUSE ─────────────────────────────────────────────
async function toggleVoice() {
  if (ttsState.loading) return;

  // If currently playing — stop
  if (ttsState.playing && ttsState.audio) {
    ttsState.audio.pause();
    ttsState.audio.currentTime = 0;
    ttsState.audio = null;
    setVoiceState('idle');
    return;
  }

  // Start new read
  setVoiceState('loading');
  const text = getPageText();

  try {
    const audioUrl = await fetchElevenLabsAudio(text);
    if (!audioUrl) { setVoiceState('idle'); return; }

    const audio = new Audio(audioUrl);
    ttsState.audio = audio;

    audio.addEventListener('ended', () => {
      setVoiceState('idle');
      URL.revokeObjectURL(audioUrl);
    });
    audio.addEventListener('error', () => {
      setVoiceState('idle');
    });

    await audio.play();
    setVoiceState('playing');

  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error('Voice error:', err);
      setVoiceState('idle');
    }
  }
}

// ── UI STATE ──────────────────────────────────────────────────────
function setVoiceState(state) {
  const inner = document.getElementById('voice-fab-inner');
  const iconPlay = document.getElementById('voice-icon-play');
  const iconPause = document.getElementById('voice-icon-pause');
  const iconLoading = document.getElementById('voice-icon-loading');
  const tooltip = document.getElementById('voice-tooltip');

  inner.classList.remove('playing', 'loading');
  iconPlay.style.display = 'none';
  iconPause.style.display = 'none';
  iconLoading.style.display = 'none';

  if (state === 'idle') {
    ttsState.playing = false;
    ttsState.loading = false;
    iconPlay.style.display = 'block';
    tooltip.textContent = 'Read aloud';
  } else if (state === 'loading') {
    ttsState.loading = true;
    ttsState.playing = false;
    inner.classList.add('loading');
    iconLoading.style.display = 'block';
    tooltip.textContent = 'Generating...';
  } else if (state === 'playing') {
    ttsState.playing = true;
    ttsState.loading = false;
    inner.classList.add('playing');
    iconPause.style.display = 'block';
    tooltip.textContent = 'Stop reading';
  }
}

// ── NO KEY NOTICE ─────────────────────────────────────────────────
function showNoKeyNotice() {
  const existing = document.getElementById('voice-no-key');
  if (existing) { existing.remove(); return; }
  const notice = document.createElement('div');
  notice.id = 'voice-no-key';
  notice.innerHTML = `
    <strong>API key not set</strong><br>
    Add your ElevenLabs key to enable voice.<br>
    <a href="https://elevenlabs.io" target="_blank" style="color:#ffaaaa">Get a free key →</a>
  `;
  document.body.appendChild(notice);
  setTimeout(() => notice.remove(), 5000);
}

// ── AUTO-STOP ON PAGE NAVIGATION ─────────────────────────────────
// When chapter changes in courses.html, stop the current audio
const _originalOpenChapter = window.openChapter;
if (typeof _originalOpenChapter === 'function') {
  window.openChapter = function(...args) {
    if (ttsState.audio) {
      ttsState.audio.pause();
      ttsState.audio = null;
      setVoiceState('idle');
    }
    return _originalOpenChapter.apply(this, args);
  };
}

// ── INIT ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', injectVoiceButton);
if (document.readyState !== 'loading') injectVoiceButton();

</script>
