<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archer SafeTrain — HV Safety Course</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@100;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--white:#FFF;--sand:#E5E0D9;--sand-light:#F2EFEB;--black:#000;--gray:#807A70;--gray-light:#C0BAB0;--red:#CC0000;--red-light:#FFF0F0;--sidebar:240px}
html,body{height:100%;width:100%;margin:0;background:var(--sand-light);font-family:"Archivo",Arial,sans-serif;font-size:14px;color:var(--black)}
.app{display:flex;min-height:100vh;width:100%}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--black);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.s-logo{padding:20px 18px 16px;border-bottom:1px solid #1f1f1f}
.s-logo-name{font-size:17px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:.15em}
.s-logo-sub{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.15em;margin-top:3px}
.s-section{padding:16px 18px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#444}
.s-course{padding:10px 18px;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.s-course:hover{background:#111}
.s-course.active{border-left-color:var(--red);background:#111}
.s-course-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#888}
.s-course.active .s-course-name{color:var(--white)}
.s-course-prog{font-size:10px;color:#555;margin-top:3px}
.prog-mini{height:2px;background:#222;margin-top:5px;border-radius:1px}
.prog-mini-fill{height:2px;background:var(--red);border-radius:1px;transition:width .3s}
.s-chapter{display:flex;align-items:center;gap:8px;padding:7px 18px 7px 28px;font-size:11px;color:#555;cursor:pointer;transition:all .1s}
.s-chapter:hover{color:#888}
.s-chapter.active{color:var(--white)}
.s-chapter.done{color:#446644}
.s-chapter i{font-size:13px;flex-shrink:0}
.s-user{margin-top:auto;padding:14px 18px;border-top:1px solid #1f1f1f}
.s-user-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--white)}
.s-user-role{font-size:10px;color:#555;margin-top:2px}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:14px 28px;border-bottom:1px solid var(--sand);background:var(--white);position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.15em}
.topbar-sub{font-size:12px;color:var(--gray);margin-top:2px}
.content{padding:28px 32px;flex:1;width:100%}
.chapter-header{margin-bottom:28px}
.chapter-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--red);margin-bottom:8px}
.chapter-title{font-size:26px;font-weight:100;color:var(--black);line-height:1.3;margin-bottom:8px}
.chapter-meta{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:16px}
.section-block{background:var(--white);border:1px solid var(--sand);border-radius:3px;padding:22px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--black);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title i{font-size:16px;color:var(--red)}
p{margin-bottom:12px;line-height:1.8;font-size:14px}
p:last-child{margin-bottom:0}
ul{margin:10px 0 10px 20px;line-height:1.8}
li{margin-bottom:4px;font-size:14px}
.img-wrap{margin:16px 0;text-align:center}
.img-wrap img{max-width:100%;border:1px solid var(--sand);border-radius:3px}
.img-caption{font-size:11px;color:var(--gray);margin-top:6px;font-style:italic}
.warn-box{background:var(--red-light);border:1px solid #FFCCCC;border-left:3px solid var(--red);padding:14px 16px;border-radius:2px;font-size:13px;color:var(--red);line-height:1.7;margin:12px 0}
.info-box{background:var(--sand-light);border:1px solid var(--sand);border-left:3px solid var(--black);padding:14px 16px;border-radius:2px;font-size:13px;color:var(--black);line-height:1.7;margin:12px 0}
.formula-box{background:#F5F0FF;border:1px solid #CCBBFF;border-radius:3px;padding:16px;margin:12px 0;text-align:center}
.formula-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#6600CC;margin-bottom:10px}
.formula{font-family:monospace;font-size:13px;background:var(--white);padding:10px 16px;border-radius:2px;margin-bottom:8px}
.formula-note{font-size:11px;color:var(--gray)}
.level-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.level-card{border:1px solid var(--sand);border-radius:3px;padding:14px}
.lv-badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.lv1-b{background:var(--sand);color:var(--black)}
.lv2-b{background:var(--black);color:var(--white)}
.lv3-b{background:var(--red);color:var(--white)}
.lv-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.level-card ul{margin-left:16px}
.level-card li{font-size:12px;margin-bottom:3px}
.def-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.def-card{border:1px solid var(--sand);border-radius:3px;padding:16px;background:var(--sand-light)}
.def-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--red);margin-bottom:8px}
.def-quote{font-style:italic;font-size:13px;line-height:1.6;margin-bottom:10px;border-left:2px solid var(--red);padding-left:10px}
.def-body{font-size:12px;color:var(--gray);line-height:1.6}
.hierarchy-visual{margin:16px 0}
.hier-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border:1px solid var(--sand);border-radius:3px;background:var(--sand-light);margin-bottom:4px}
.hier-item.red-item{border-color:#FFCCCC;background:var(--red-light)}
.hier-num{width:28px;height:28px;border-radius:2px;background:var(--black);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.hier-item.red-item .hier-num{background:var(--red)}
.hier-content .hier-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.hier-content .hier-desc{font-size:12px;color:var(--gray)}
.hier-arrow{text-align:center;color:var(--gray-light);font-size:16px;margin:2px 0}
.rule-list{margin:10px 0}
.rule-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--sand);font-size:13px;line-height:1.5}
.rule-row:last-child{border-bottom:none}
.rule-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--black)}
.rule-icon.red{color:var(--red)}
.rule-icon.num{background:var(--black);color:var(--white);border-radius:2px;font-size:10px;font-weight:700}
.loto-step{border:1px solid var(--sand);border-radius:3px;padding:16px;margin-bottom:12px}
.loto-step-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.loto-num{background:var(--red);color:var(--white);padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.loto-step-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.five-rules-list{display:flex;flex-direction:column;gap:12px}
.five-rule{border:1px solid var(--sand);border-radius:3px;padding:16px}
.five-rule-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.five-num{width:32px;height:32px;border-radius:2px;background:var(--black);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.five-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.normal-op-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.norm-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--sand);border-radius:3px;font-size:13px;line-height:1.5}
.norm-num{width:24px;height:24px;border-radius:2px;background:var(--black);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.impact-card{border-radius:3px;padding:14px;margin:12px 0}
.impact-card.green{background:#F0FFF0;border:1px solid #AADDAA}
.impact-card.yellow{background:#FFFBF0;border:1px solid #FFE4AA}
.impact-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.eng-controls-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.eng-card{border:1px solid var(--sand);border-radius:3px;padding:14px;background:var(--sand-light)}
.eng-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.eng-impact{font-size:12px;color:var(--gray);line-height:1.5}
.method-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.method-card{border:1px solid var(--sand);border-radius:3px;padding:16px;background:var(--sand-light)}
.method-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.method-card p{font-size:12px;margin-bottom:6px;line-height:1.5}
.doc-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.doc-card{border:1px solid var(--sand);border-radius:3px;padding:16px;background:var(--sand-light)}
.doc-icon{font-size:24px;margin-bottom:8px}
.doc-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.doc-body{font-size:12px;color:var(--gray);line-height:1.5}
.exemption-cards{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.exemption-card{flex:1;min-width:120px;border:1px solid var(--sand);border-radius:3px;padding:14px;text-align:center;background:var(--sand-light);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.exemption-card i{display:block;font-size:22px;margin-bottom:8px}
.six-rules-list{display:flex;flex-direction:column;gap:12px}
.six-rule{border:1px solid var(--sand);border-radius:3px;padding:16px}
.six-rule-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.six-num{width:32px;height:32px;border-radius:2px;background:var(--red);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.six-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.rating-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.rating-card{border:1px solid var(--sand);border-radius:3px;padding:14px;text-align:center;background:var(--sand-light)}
.rating-val{font-size:22px;font-weight:100}
.rating-label{font-size:11px;color:var(--gray);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.table-wrap{overflow-x:auto;margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--black);color:var(--white);padding:10px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
td{padding:9px 12px;border-bottom:1px solid var(--sand)}
tr:nth-child(even) td{background:var(--sand-light)}
.knowledge-check{background:var(--sand-light);border:1px solid var(--sand);border-top:3px solid var(--black);border-radius:3px;padding:18px;margin-top:40px}
.kc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--gray);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--sand)}
.kc-title i{font-size:16px;color:var(--red)}
.kc-item{margin-bottom:8px;border:1px solid var(--sand);border-radius:2px;overflow:hidden;background:var(--white)}
.kc-q{padding:12px 14px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none}
.kc-q:hover{background:var(--sand-light)}
.kc-q i{flex-shrink:0;font-size:16px;color:var(--gray);transition:transform .2s}
.kc-q.open i{transform:rotate(180deg)}
.kc-a{display:none;padding:12px 14px;font-size:13px;line-height:1.7;border-top:1px solid var(--sand);background:var(--sand-light)}
.kc-complete-msg{text-align:center;padding:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#006600;margin-top:10px}
.chapter-nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--sand)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:1.5px solid var(--black);border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;background:var(--black);color:var(--white);font-family:"Archivo",Arial,sans-serif;transition:all .12s}
.btn:hover{background:#1a1a1a}
.btn.ghost{background:var(--white);color:var(--black)}
.btn.ghost:hover{background:var(--sand-light)}
.btn.red{background:var(--red);border-color:var(--red)}
.btn.red:hover{background:#aa0000}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn.big{padding:14px 28px;font-size:11px}
.quiz-wrap{max-width:100%}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.q-prog-bar{height:3px;background:var(--sand);margin-bottom:24px}
.q-prog-fill{height:3px;background:var(--red);transition:width .3s}
.q-level{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border-radius:2px;margin-bottom:10px;display:inline-block}
.ql1{background:var(--sand);color:var(--black)}
.ql2{background:var(--black);color:var(--white)}
.ql3{background:var(--red);color:var(--white)}
.q-counter{font-size:11px;color:var(--gray);margin-bottom:8px}
.q-text{font-size:16px;font-weight:400;line-height:1.5;margin-bottom:20px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1.5px solid var(--sand);border-radius:2px;margin-bottom:8px;cursor:pointer;font-size:13px;line-height:1.4;transition:all .1s}
.opt:hover{border-color:var(--gray-light);background:var(--sand-light)}
.opt.sel{border-color:var(--black);background:var(--sand-light)}
.opt.correct{border-color:#006600;background:#F0FFF0}
.opt.wrong{border-color:var(--red);background:var(--red-light)}
.opt-letter{width:24px;height:24px;border-radius:2px;border:1.5px solid var(--sand);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray)}
.opt.sel .opt-letter{background:var(--black);border-color:var(--black);color:var(--white)}
.opt.correct .opt-letter{background:#006600;border-color:#006600;color:var(--white)}
.opt.wrong .opt-letter{background:var(--red);border-color:var(--red);color:var(--white)}
.timer{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--sand);border-radius:2px;font-size:14px;font-weight:700}
.timer.urgent{border-color:var(--red);color:var(--red);background:var(--red-light)}
.result-hero{text-align:center;padding:32px 20px 24px;border-bottom:1px solid var(--sand);margin-bottom:24px}
.result-score{font-size:64px;font-weight:100;line-height:1}
.result-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;margin-top:8px;color:var(--gray)}
.result-bar{height:6px;background:var(--sand);max-width:300px;margin:16px auto}
.result-bar-fill{height:6px;transition:width .6s}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.rstat{background:var(--sand-light);border:1px solid var(--sand);border-radius:2px;padding:14px;text-align:center}
.rstat-val{font-size:24px;font-weight:100}
.rstat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-top:4px}
.review-item{border:1px solid var(--sand);border-radius:2px;padding:16px;margin-bottom:10px}
.review-item.pass{border-left:3px solid #006600}
.review-item.fail{border-left:3px solid var(--red)}
.review-q{font-size:13px;font-weight:700;margin-bottom:10px;line-height:1.5}
.review-ans{font-size:12px;padding:6px 10px;border-radius:2px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.review-ans.correct{background:#F0FFF0;color:#006600}
.review-ans.wrong{background:var(--red-light);color:var(--red)}
.home-hero{background:var(--black);color:var(--white);padding:40px;border-radius:3px;margin-bottom:20px}
.home-hero h1{font-size:32px;font-weight:100;margin-bottom:10px;line-height:1.3}
.home-hero p{font-size:14px;color:#888;line-height:1.7;max-width:520px}
.course-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.ccard{background:var(--white);border:1px solid var(--sand);border-radius:3px;padding:20px;cursor:pointer;transition:border-color .12s}
.ccard:hover{border-color:var(--gray-light)}
.ccard-icon{font-size:24px;margin-bottom:10px}
.ccard-level{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--red);margin-bottom:6px}
.ccard-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.ccard-meta{font-size:12px;color:var(--gray)}
.ccard-prog{margin-top:12px}
.ccard-prog-bar{height:3px;background:var(--sand)}
.ccard-prog-fill{height:3px;background:var(--black);transition:width .3s}
.ccard-prog-label{font-size:10px;color:var(--gray);margin-top:4px}
.cause-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.cause-item{display:flex;align-items:center;gap:8px;padding:12px;border:1px solid var(--sand);border-radius:3px;background:var(--sand-light);font-size:12px;font-weight:600}
.cause-item i{font-size:18px;color:var(--red);flex-shrink:0}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar" id="sidebar">
  <div class="s-logo">
    <div class="s-logo-name">Archer</div>
    <div class="s-logo-sub">SafeTrain</div>
  </div>
  <div id="sidebar-nav"></div>
  <div class="s-user">
    <div class="s-user-name">A. Reyes</div>
    <div class="s-user-role">HV Operations</div>
  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">HV Safety Training</div>
      <div class="topbar-sub" id="topbar-sub">Select a course to begin</div>
    </div>
    <button class="btn ghost" onclick="showHome()" style="font-size:10px"><i class="ti ti-home"></i> All courses</button>
  </div>
  <div class="content" id="content"></div>
</div>
</div>
<script>
// ── CHAPTER CONTENT ─────────────────────────────────────────────
// Stored as JSON (double-quoted) to avoid backtick nesting issues.
// Images embedded as data URIs directly in the HTML strings.
// Injected via element.innerHTML — NOT inside a template literal.

CHAPTERS["l1c1"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-bolt\"></i>Archer's Electrical Safety Program</div><p>Archer Aviation operates high voltage electrical systems across its labs, manufacturing areas, and test facilities. The Midnight eVTOL aircraft relies on large-format, high-voltage battery systems — which means everyone who works at Archer needs to understand what HV hazards look like and how to stay safe around them.</p><p>Archer's electrical safety program is structured around three training levels. Each level unlocks a different scope of work. You cannot skip levels — each one builds directly on the previous.</p><div class=\"level-cards\"><div class=\"level-card\"><div class=\"lv-badge lv1-b\">Level 1</div><div class=\"lv-title\">Basic Introductory Training</div><ul><li>Required for access into ALL Archer labs and manufacturing areas</li><li>Covers hazard awareness, approach boundaries, hazard control hierarchy, PPE overview, and best practices</li><li>Does NOT authorize you to perform any work on HV systems</li><li>Recommended for everyone at Archer — managers, engineers, technicians, and visitors who regularly access labs</li></ul></div><div class=\"level-card\"><div class=\"lv-badge lv2-b\">Level 2</div><div class=\"lv-title\">De-energized HV Work</div><ul><li>Work on fully de-energized high voltage systems with LOTO applied</li><li>Work on energized, enclosed, normally operating HV systems</li><li>Recommended for managers who need to understand HV safety in detail</li><li>Requires separate qualification approval from your manager</li></ul></div><div class=\"level-card\"><div class=\"lv-badge lv3-b\">Level 3</div><div class=\"lv-title\">Energized HV Work</div><ul><li>Work on energized, EXPOSED, normally operating HV systems</li><li>Work on energized, enclosed, ABNORMALLY operating HV systems</li><li>Requires formal Risk Assessment and Energized Electrical Work Permit</li><li>Highest risk level — requires separate qualification and annual recertification</li></ul></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-zap\"></i>What is \"High Voltage\" at Archer?</div><div class=\"warn-box\"><strong>Any voltage at or above 50 Volts AC or DC is High Voltage at Archer.</strong><br><br>OSHA defines any voltage 50V and above as hazardous. This is lower than many people expect. A 60V DC bench supply, a 120V AC outlet, a 400V inverter output, or the full ~800V battery pack in Midnight — all are High Voltage at Archer and require HV safety compliance.</div><p>The 50V threshold matters because it is where current levels become capable of causing ventricular fibrillation — disruption of the heart rhythm that causes cardiac arrest. Even brief contact above 50V can be fatal depending on the current path through the body.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-book-2\"></i>NFPA 70E Standard</div><p>Archer's electrical safety program is built on <strong>NFPA 70E — Standard for Electrical Safety in the Workplace</strong>. This is the industry standard that defines approach boundaries, hazard control techniques, electrically safe work conditions, PPE categories, Lock-Out Tag-Out requirements, arc flash study methodology, Risk Assessment requirements, and Energized Electrical Work Permit requirements.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-users\"></i>Trained Person vs. Qualified Person</div><p>NFPA 70E defines two categories of personnel. These are formal definitions with legal weight — not informal labels.</p><div class=\"def-cards\"><div class=\"def-card\"><div class=\"def-label\">Trained Person — Level 1</div><div class=\"def-quote\">\"One who has received safety training to identify and avoid the hazards involved.\"</div><div class=\"def-body\">Permitted to enter Archer labs. Understands HV hazards, boundaries, and what to do if something seems unsafe. NOT permitted to work on any HV system. May not enter the Restricted boundary under any circumstances.</div></div><div class=\"def-card\"><div class=\"def-label\">Qualified Person — Level 2 or 3</div><div class=\"def-quote\">\"One who has demonstrated skills and knowledge related to the construction and operation of electrical equipment and installations and has received safety training to identify and avoid the hazards involved.\"</div><div class=\"def-body\">Completed Level 2 or 3 AND received formal qualification approval from their manager. Demonstrated hands-on knowledge of electrical systems. Permitted to work on HV systems within their qualification scope. Per Archer's program, refer to the Authorization form in the Electrical Safety Program document.</div></div></div></div><div class=\"knowledge-check\" data-id=\"l1c1\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the minimum voltage considered High Voltage at Archer and why? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">50V AC or DC. OSHA defines this as hazardous because at this threshold, electrical current becomes capable of causing ventricular fibrillation — disruption of heart rhythm leading to cardiac arrest.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What standard is Archer's electrical safety program built on and what does it define? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">NFPA 70E — Standard for Electrical Safety in the Workplace. It defines approach boundaries, hazard controls, PPE categories, LOTO requirements, arc flash study methodology, Risk Assessment, and Energized Electrical Work Permit requirements.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the key difference between a Trained Person and a Qualified Person? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">A Trained Person (Level 1) has received safety training to identify and avoid hazards. A Qualified Person (Level 2 or 3) has additionally demonstrated skills and knowledge of electrical equipment construction and operation, and has received formal qualification approval from their manager.</div></div></div>";
CHAPTERS["l1c2"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-alert-triangle\"></i>The Two Main Electrical Hazards</div><p>Every HV task at Archer involves one or both of two electrical hazards. You must identify which are present before approaching any HV equipment. This determines whether you can approach, what PPE you need, and what qualification level is required.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-activity\"></i>Hazard 1 — Electrical Shock</div><div class=\"img-wrap\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAG/AtADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD2aiiqWsNdLot81iCboW8hgA6l9p2/rigDN1bxz4Z0S6NrfatClwvWGMNK4+qqCR+NR6b8QPC2qXa2lvq0a3DnCxzo8LMfbeBms34Wrop8I2smnCI3hT/T2PM3nfx7yeeucZ7V0Wv6DYeItKmsL+2jmV0IUsOUbHDKeoINAGlS1keHYL/S/C9nBrVxHJd20G2eYOSp2553HHYDJNY8HivXdaBufD3h1J9PJIju7278jzwOMogUnb6E4zQB19FYOg+JH1O9uNL1HT5NM1S1RZHt3kEivGeA6OPvLnjtg1WvPFd5Pq1xpfh3SDqc9oQt1PJOIYIWP8O7BLN6gDigDp6K5SLxbqOnX9va+JtFGnRXUgihvILgTQGQ9FY4BQntkYq94i8VWfhqexF8NsF20gabP+r2IW6Y+YnGAB3NAG7RXJDX/F9xH9qtPCEa255SK61BY52HuoUhT7E1r6B4gttf0gahEj2+xmjnim4aGRThlb6UAa1FcjbeK9c1yI3Xh7w8k9gWIiur278gTAHGVQKTj0JxVvSfFFzNrA0XW9KbTNQeMywATCWK4Ufe2OAOR3 <strong>Why Archer systems are dangerous:</strong> The Midnight aircraft operates at voltages and currents well above the threshold for ventricular fibrillation. Even momentary, accidental contact with an exposed energized conductor can be fatal.</p><div class=\"info-box\"><strong>The Shock Hazard Space</strong> is the zone around exposed energized conductors where shock is possible. It starts at the conductor surface and extends to the Restricted boundary. Only Qualified persons may work within this space.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-flame\"></i>Hazard 2 — Arc Flash and Arc Blast</div><p><strong>Arc flash:</strong> A high-energy electrical explosion caused by a fault, releasing extreme heat and pressure in milliseconds. Occurs when insulation or air breaks down, allowing high current to arc between conductors or to ground. Arc flash is typically caused by accidental contact, equipment failure, contamination, or poor maintenance.</p><p><strong>Arc blast:</strong> The pressure wave created as a result of the arc flash. Workers outside the thermal hazard zone can be thrown across rooms by the blast pressure, causing severe blunt trauma even without burns.</p><p>Arc flash releases temperatures that can exceed 35,000 degrees Fahrenheit, blinding UV light, molten metal droplets, vaporized copper, and a concussive pressure wave — all in milliseconds.</p><p><strong>Common causes at Archer:</strong></p><div class=\"cause-grid\"><div class=\"cause-item\"><i class=\"ti ti-hand-stop\"></i>Accidental contact with energized parts</div><div class=\"cause-item\"><i class=\"ti ti-tool\"></i>Dropped tools or conductive objects</div><div class=\"cause-item\"><i class=\"ti ti-alert-circle\"></i>Insulation failure due to age or damage</div><div class=\"cause-item\"><i class=\"ti ti-plug\"></i>Loose or improperly installed connections</div><div class=\"cause-item\"><i class=\"ti ti-droplet\"></i>Dust or moisture inside equipment</div><div class=\"cause-item\"><i class=\"ti ti-trash\"></i>Foreign objects or debris inside enclosures</div><div class=\"cause-item\"><i class=\"ti ti-tool\"></i>Poor maintenance</div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-calculator\"></i>Measuring Arc Flash: Incident Energy</div><p>Arc Flash Incident Energy is expressed in <strong>cal/cm²</strong>. This tells us how much thermal energy reaches a worker at a given working distance during a fault. Higher value = more protective PPE required. NFPA 70E uses incident energy to assign PPE to four categories. The threshold of <strong>1.2 cal/cm²</strong> is important — below this, certain switching operations may not require PPE.</p><div class=\"warn-box\"><strong>Arc flash incident energy is NOT the same as thermal runaway energy.</strong><br>Arc flash incident energy = thermal energy reaching a worker during an electrical fault.<br>Thermal runaway energy = total energy a battery releases when it fails chemically.<br>These are completely different phenomena. Never confuse them when assessing Archer's HV battery systems.</div></div><div class=\"knowledge-check\" data-id=\"l1c2\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the definition of electrical shock hazard? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">The risk of harmful electrical current passing through the human body due to contact with exposed energized electrical conductors or circuit parts. Severity ranges from a harmless jolt to a lethal discharge.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the difference between arc flash and arc blast? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Arc flash is the high-energy electrical explosion itself — releasing extreme heat, light, and molten metal. Arc blast is the pressure wave created as a result of the arc flash. Both can cause severe injury even at some distance from the fault.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">List four common causes of arc flash at Archer. <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Any four of: accidental contact with energized parts, dropped tools or conductive objects, insulation failure, loose or improperly installed connections, dust or moisture inside equipment, poor maintenance, foreign objects or debris.</div></div></div>";
CHAPTERS["l1c3"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-map-pin\"></i>Electrical Hazard Spaces</div><p>Each electrical hazard occupies a defined space around energized equipment. Understanding these spaces is what makes the approach boundaries meaningful — they are not arbitrary lines, they correspond directly to the physical hazard zones.</p><div class=\"def-cards\"><div class=\"def-card\"><div class=\"def-label\">Shock Hazard Space</div><div class=\"def-body\">The zone immediately around exposed energized conductors where direct electrical contact is possible. Begins at the conductor surface. The Restricted boundary defines the outer edge of this space.</div></div><div class=\"def-card\"><div class=\"def-label\">Arc Flash Space</div><div class=\"def-body\">The zone around energized equipment within which a person could receive a second-degree burn from an arc flash. Defined by the arc flash incident energy at a given distance. The Arc Flash boundary defines the outer edge.</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-map-pin\"></i>The Three Approach Boundaries</div><p>NFPA 70E defines three approach boundaries around energized electrical equipment. Each has specific rules about who is permitted inside and what PPE is required. These are legally enforceable.</p><div class=\"img-wrap\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAGwArwDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQo fZbj/AJ95f++DUuMuxSlHuRU01P8AZLn/AJ95f++DSG0uf+feX/vg1PJLsVzR7kNFSm1uf+feX/vg0htbr/n3l/74NTyS7BzR7kJ60mQc4IOOtPmt7uOJmW1mZuwEZPNZtrpmpS3cafZ7iLe3zO0ZAA7k0KlOT2NY8rTbZ0+hWKDdevGN7fKpxyBW1TY41ijVFGAowKfX0+HpKlTUEeBVqOpNyYV5t8S5zN4j0Wz6rDHLcsO2eFH8zXpNeXeLNP1S+8aX11Fp93JBFaxwRMsDEMeWbBxz+FGJbVKVjbBpOvG5xUzb7pjU0QqwPD+tGRmOj3/J/wCfZ/8ACrUWgawBzpN9/wCA7/4V5cotLY92M433I4h0q/awvPLHDEpaSRgqgetEeiaqOumXg/7YN/hXZ+DvD0lsx1G+iZJcYijdcFR3JHY1jChOrNRsaVMTCjTcr69BniqwXSND0a9jXnSL2GR2HHyE7X/9Cz+FdS0RPK8g81U8S6cdW8M6jYICWnt3VQP72OP1xUugzT3GgWE11FJDO1uhljkUqyttGQQeRzX0CSirI+VlJybbEZSOoIphFaeKTaPQflTEZRHtSeU7fdRj+Fa+B6CloAyVsZ3P3Qo96mTSl6yOT7LxWhRQBSutJs7zTrixmhBhuY2ikHcqRg15Dq3wr8Ww3Bh066s722BzHLOdkgHZTxXtdJQB5J4V+Ed+NXi1HxPNA0ULbks4DuVmHTcfT2r1scUtFABRRRQAUUUUAf/Z\" alt=\"Restricted boundary — only Qualified persons permitted, PPE required at all times\"><div class=\"img-caption\">Restricted boundary — only Qualified persons permitted, PPE required at all times</div></div><div class=\"warn-box\"><strong>Only Qualified persons are permitted within the Restricted boundary. Unqualified persons are NEVER permitted — not for any reason, not even with an escort. PPE must be worn at all times inside this boundary. No exceptions.</strong></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-circle\"></i>Limited Approach Boundary</div><p>The middle boundary. Exists within the shock hazard space. Unqualified persons who are not accustomed to working near electrical hazards may not enter unescorted.</p><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Only Qualified persons may work within this boundary independently</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Unqualified persons may enter ONLY when escorted by a Qualified person</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>PPE must be worn at all times inside this boundary</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-circle\"></i>Arc Flash Boundary — Outermost</div><p>The distance at which a person without PPE could receive a second-degree burn from an arc flash — where incident energy equals 1.2 cal/cm². Outside this boundary, an arc flash would not cause a burn injury to an unprotected worker.</p><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>PPE must be worn by anyone inside this boundary during energized work</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Barriers placed at the greater of: this boundary OR the limited approach boundary</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Exact distance varies by system voltage and fault current — check the arc flash label on the equipment</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-table\"></i>NFPA 70E 2024 Boundary Values</div><p>These values are derived from empirical research, electrical clearance standards, and industry consensus data. They are the values currently in effect at Archer.</p><div class=\"table-wrap\"><table><tr><th>Voltage (AC)</th><th>Restricted Boundary</th><th>Limited Approach</th></tr><tr><td>Less than 50V</td><td>None</td><td>None</td></tr><tr><td>50V to 150V</td><td>Avoid contact</td><td>1.0 m (3 ft 3 in)</td></tr><tr><td>151V to 750V</td><td>0.3 m (1 ft)</td><td>1.0 m (3 ft 3 in)</td></tr><tr><th>Voltage (DC)</th><th>Restricted Boundary</th><th>Limited Approach</th></tr><tr><td>Less than 50V</td><td>None</td><td>None</td></tr><tr><td>50V to 300V</td><td>Avoid contact</td><td>1.0 m (3 ft 3 in)</td></tr><tr><td>301V to 1000V</td><td>0.3 m (1 ft)</td><td>1.0 m (3 ft 3 in)</td></tr><tr><td>1001V to 5000V</td><td>0.5 m (1 ft 8 in)</td><td>1.5 m (5 ft)</td></tr></table></div></div><div class=\"knowledge-check\" data-id=\"l1c3\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Can an unqualified person enter the Restricted boundary if escorted by a Qualified person? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. Unqualified persons are never permitted inside the Restricted boundary under any circumstances — not even with an escort. This is an absolute rule with no exceptions.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Where do the boundary values come from? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Empirical research, electrical clearance standards, and industry consensus and historical data.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the Restricted boundary distance for AC 151V to 750V? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">0.3 m (1 foot) per NFPA 70E 2024.</div></div></div>";
CHAPTERS["l1c4"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-stack\"></i>The Hierarchy of Hazard Control Techniques</div><p>Hazard control techniques are ordered from most effective to least effective. Always attempt the highest-level control available before falling back to lower ones. <strong>Never jump straight to PPE.</strong> PPE is the last resort — it does not eliminate the hazard, it only protects you if other controls fail.</p><p>The hierarchy exists to push engineers and technicians toward solutions that actually reduce or remove the hazard, rather than simply accepting risk and putting on more protection.</p><div class=\"hierarchy-visual\"><div class=\"hier-item\"><div class=\"hier-num\">1</div><div class=\"hier-content\"><div class=\"hier-label\">Elimination</div><div class=\"hier-desc\">Remove the hazard — task at 0V or below 50V. Most effective: no HV = no hazard = no PPE needed after voltage-free confirmed. This makes it a Level 2 task.</div></div></div><div class=\"hier-arrow\"><i class=\"ti ti-arrow-down\"></i></div><div class=\"hier-item\"><div class=\"hier-num\">2</div><div class=\"hier-content\"><div class=\"hier-label\">Substitution</div><div class=\"hier-desc\">Replace with a lesser hazard — lower HV closer to 50V. Reduces incident energy and may reduce PPE category. HV hazard still present.</div></div></div><div class=\"hier-arrow\"><i class=\"ti ti-arrow-down\"></i></div><div class=\"hier-item\"><div class=\"hier-num\">3</div><div class=\"hier-content\"><div class=\"hier-label\">Engineering Controls</div><div class=\"hier-desc\">Physical changes to isolate workers: interlocks, arc reducing circuit breakers, insulation covers (shock only — NOT arc flash), remote operation. HV hazard still present.</div></div></div><div class=\"hier-arrow\"><i class=\"ti ti-arrow-down\"></i></div><div class=\"hier-item\"><div class=\"hier-num\">4</div><div class=\"hier-content\"><div class=\"hier-label\">Administrative Controls</div><div class=\"hier-desc\">Training, badge access, LOTO program, Level 2/3 qualification requirements, HV Test Setup Checklist, Risk Assessment forms. HV hazard still present.</div></div></div><div class=\"hier-arrow\"><i class=\"ti ti-arrow-down\"></i></div><div class=\"hier-item red-item\"><div class=\"hier-num\">5</div><div class=\"hier-content\"><div class=\"hier-label\">PPE — Last Line of Defense</div><div class=\"hier-desc\">Worn inside approach boundaries. Protects if all other controls fail. Substitution and Engineering Controls must be tried first. Does not eliminate the hazard.</div></div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-info-circle\"></i>Engineering Controls — Two Types</div><p>Engineering controls come in two forms:</p><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div><strong>Inherent (built into equipment):</strong> Residual current circuit breakers, electrical safety interlocks, isolation monitoring systems</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div><strong>Employed (applied for a specific task):</strong> Insulation cover, arc reducing circuit breaker, remote operation — covered in detail in Level 3</div></div></div><div class=\"warn-box\"><strong>An insulation cover eliminates the electric shock hazard only. It does NOT protect against arc flash.</strong> Never assume a covered terminal is safe from arc flash.</div></div><div class=\"knowledge-check\" data-id=\"l1c4\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">List the 5 hazard control techniques in order. <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">1. Elimination 2. Substitution 3. Engineering Controls 4. Administrative Controls 5. PPE</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What are the two types of engineering controls with examples of each? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Inherent (built-in): residual current circuit breakers, electrical safety interlocks, isolation monitoring systems. Employed (applied for task): insulation cover, arc reducing circuit breaker, remote operation.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What must be tried before selecting PPE? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Substitution and engineering controls must be tried to minimize electrical hazards before selecting and using PPE. PPE is always the last resort.</div></div></div>";
CHAPTERS["l1c5"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-tools\"></i>HV Insulated Tools</div><p>Standard tools are not safe for HV work. All tools used when working on or near HV systems at Archer must be specifically rated HV insulated tools. Using uninsulated or incorrectly rated tools near energized HV equipment is a serious safety violation that can cause fatal shock or initiate an arc flash.</p><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Always use HV insulated tools when working on high voltage systems</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Tools must be rated for <strong>1000V AC and 1500V DC</strong> minimum</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Immediately dry tools if they get wet — moisture degrades insulation and reduces protection</div></div><div class=\"rule-row\"><div class=\"rule-icon red\"><i class=\"ti ti-x\"></i></div><div><strong>Remove damaged tools from inventory immediately</strong> — tag out and report. Cracked or worn insulation provides no protection.</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-bulb\"></i>Hazard Lights</div><p>Every HV test bench must have a hazard light. The rule: <strong>ON when energized, OFF when not.</strong></p><div class=\"warn-box\">Never leave the hazard light on when the system is de-energized — this creates confusion and can cause someone to treat an energized system as safe because \"the light is not on.\" If you see a hazard light on and did not know the system was energized — stop and confirm before approaching. Always verify system state with a meter before touching anything.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-emergency-bed\"></i>e-STOP</div><p>All HV test benches at Archer must have an accessible e-STOP designed to kill all electric power during emergencies. Before starting any HV task, every person in the area must know exactly where it is. In an emergency, there is no time to search for it.</p><div class=\"info-box\"><strong>e-STOP does NOT guarantee de-energization.</strong> It cuts control power but stored energy in capacitors, batteries, or inductors may remain. System state after an e-STOP is unknown until independently verified. Checking status after an e-STOP is a Level 3 task — never assume the system is safe.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-barrier-block\"></i>Barriers, Safety Labels, and Buddy System</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Erect barriers at the <strong>greater of</strong>: limited approach boundary OR arc flash boundary</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div>Every HV equipment must have safety labels clearly stating the potential danger</div></div><div class=\"rule-row\"><div class=\"rule-icon red\"><i class=\"ti ti-users\"></i></div><div><strong>Follow the buddy system for Level 2 and Level 3 tasks — never perform HV work alone.</strong> Your buddy must know the e-STOP location, monitor for hazards, and be ready to call for emergency help if you are incapacitated.</div></div></div></div><div class=\"knowledge-check\" data-id=\"l1c5\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What is the minimum insulation rating for HV tools at Archer? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">1000V AC and 1500V DC minimum. Must be specifically rated HV insulated tools.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">If the hazard light is off, is the system guaranteed to be de-energized? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. Never rely solely on the hazard light. Always verify with a meter. The hazard light is an indicator — not a guarantee of system state.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What are your buddy's responsibilities during HV work? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Know the e-STOP location, monitor for hazards, be ready to call for emergency help if you are incapacitated, and be aware of what you are doing. The buddy does not need to perform the same work — they need to be present, alert, and ready to respond.</div></div></div>";
CHAPTERS["l2c0"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-bolt\"></i>Welcome to Level 2</div><p>Level 2 builds directly on Level 1. Where Level 1 gave you awareness and lab access, Level 2 gives you authorization to work on HV systems. Completing Level 2 and receiving your manager's qualification allows you to perform two categories of HV work.</p><div class=\"level-cards\"><div class=\"level-card\"><div class=\"lv-badge lv2-b\">Category A</div><div class=\"lv-title\">De-energized HV Work</div><ul><li>System is fully de-energized — all power sources disconnected</li><li>LOTO applied — physically locked against re-energization</li><li>Voltage-free confirmed with a meter before work begins</li><li>Lowest risk HV work at Archer</li></ul></div><div class=\"level-card\"><div class=\"lv-badge lv2-b\">Category B</div><div class=\"lv-title\">Enclosed Normal Operation</div><ul><li>System may be energized but fully enclosed — no exposed conductors</li><li>All 6 Normal Operation conditions per NFPA 70E 130.2(A)(4) met</li><li>Workers outside the enclosure face no direct electrical hazard</li><li>Example: monitoring a running HV test from outside the enclosure</li></ul></div></div><div class=\"warn-box\" style=\"margin-top:16px\"><strong>Level 2 does NOT authorize work on energized, exposed HV systems.</strong><br>If conductors are exposed and energized, that is a Level 3 task regardless of whether the system appears to be running normally. Stop, reassess, and either de-energize or involve a Level 3 Qualified person.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-map\"></i>Level 2 Training Structure</div><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon num\">1</div><div><strong>Approach Boundaries and Normal Operation</strong> — deepen your understanding of the 3 boundaries and what Normal Operation means in practice</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">2</div><div><strong>Hazard Identification — 7 Scenarios</strong> — apply your knowledge to 7 real scenarios with actual training images</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">3</div><div><strong>Personal Protective Equipment</strong> — the 5 required items, how to select the correct category, inspection and maintenance requirements</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">4</div><div><strong>Lockout/Tagout</strong> — the 4-step LOTO procedure in detail, correct technique for each step, absolute rules, and removal protocol</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">5</div><div><strong>5 Safety Rules</strong> — the mandatory procedure for every de-energized HV task</div></div><div class=\"rule-row\"><div class=\"rule-icon num\">6</div><div><strong>Level 2 Best Practices</strong> — insulation cover, hazard lights, barriers, buddy system, and HV-specific safety habits</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-shield-check\"></i>Qualification Process</div><div class=\"info-box\"><strong>Level 1 must be complete before starting Level 2.</strong><br><br>After completing all modules and passing the Level 2 quiz (80% minimum), your manager will receive a notification. They will review your HV Qualification Form, assess whether you have demonstrated the necessary skills and behaviors, and formally approve your Level 2 qualification. You will receive your certificate once approved.</div></div><div class=\"knowledge-check\" data-id=\"l2c0\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What two categories of work does Level 2 authorize? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Category A: de-energized HV work with LOTO applied and voltage-free confirmed. Category B: work on or around energized, fully enclosed, normally operating HV systems with no exposed conductors.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">A colleague points to an energized system with exposed conductors running normally — can you work on it with Level 2 authorization? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. Exposed conductors + energized = Level 3 task. Level 2 only covers fully enclosed systems when energized. Stop, de-energize, or involve a Level 3 Qualified person.</div></div></div>";

Ps8/wDzxk/75NS4y7Duu5HSVJ9nn/54yf8AfJo+zz/88ZP++TU8suw+ZdyI0lSm3n/54yf98mk+zT/88ZP++DUuMuw+ZdyKkqX7NP8A88ZP++TR9muP+eEn/fBqeWXYaku5ETTamNrcf88JP++DSfZrj/nhJ/3waXJLsPmj3ITSZqX7Lc/88Jf++DSfZbj/AJ95f++DUuMuxSlHuRU01P8AZLn/AJ95f++DSG0uf+feX/vg1PJLsVzR7kNFSm1uf+feX/vg0htbr/n3l/74NTyS7BzR7kJ60mQc4IOOtPmt7uOJmW1mZuwEZPNZtrpmpS3cafZ7iLe3zO0ZAA7k0KlOT2NY8rTbZ0+hWKDdevGN7fKpxyBW1TY41ijVFGAowKfX0+HpKlTUEeBVqOpNyYV5t8S5zN4j0Wz6rDHLcsO2eFH8zXpNeXeLNP1S+8aX11Fp93JBFaxwRMsDEMeWbBxz+FGJbVKVjbBpOvG5xUzb7pjU0QqwPD+tGRmOj3/J/wCfZ/8ACrUWgawBzpN9/wCA7/4V5cotLY92M433I4h0q/awvPLHDEpaSRgqgetEeiaqOumXg/7YN/hXZ+DvD0lsx1G+iZJcYijdcFR3JHY1jChOrNRsaVMTCjTcr69BniqwXSND0a9jXnSL2GR2HHyE7X/9Cz+FdS0RPK8g81U8S6cdW8M6jYICWnt3VQP72OP1xUugzT3GgWE11FJDO1uhljkUqyttGQQeRzX0CSirI+VlJybbEZSOoIphFaeKTaPQflTEZRHtSeU7fdRj+Fa+B6CloAyVsZ3P3Qo96mTSl6yOT7LxWhRQBSutJs7zTrixmhBhuY2ikHcqRg15Dq3wr8Ww3Bh066s722BzHLOdkgHZTxXtdJQB5J4V+Ed+NXi1HxPNA0ULbks4DuVmHTcfT2r1scUtFABRRRQAUUUUAf/Z\" alt=\"Approach boundaries — Restricted, Limited Approach, and Arc Flash zones\"><div class=\"img-caption\">Approach boundaries — Restricted, Limited Approach, and Arc Flash zones</div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-circle-filled\" style=\"color:var(--red)\"></i>Restricted Boundary</div><p>The innermost boundary, within the shock hazard space. Working here means you are very close to live HV conductors. The risk of electrical arc-over is significantly elevated.</p><p>From NFPA 70E: \"Employee must be Qualified to work on equipment within the Restricted boundary. Unqualified person is not permitted at any time within the Restricted boundary. PPE must be worn at all times while working within the Restricted boundary.\"</p><div class=\"warn-box\"><strong>Only Qualified persons — Restricted boundary. Unqualified persons — NEVER. No escort exception. No exceptions period.</strong></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-circle\"></i>Limited Approach and Arc Flash Boundaries</div><p>From NFPA 70E: \"Only Qualified persons are permitted within the Limited approach and arc flash boundaries. Unqualified persons are permitted within the Limited approach and arc flash boundaries only when escorted by a Qualified person. PPE must be worn at all times within the Limited approach and arc flash boundaries.\"</p><div class=\"rule-list\"><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div><strong>Limited Approach:</strong> Qualified persons only, or unqualified with escort. PPE required.</div></div><div class=\"rule-row\"><div class=\"rule-icon\"><i class=\"ti ti-check\"></i></div><div><strong>Arc Flash:</strong> PPE required for anyone inside. Barriers placed here. Exact distance from arc flash study results.</div></div></div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-checklist\"></i>Normal Operation — All 6 Conditions Required</div><p>A fully enclosed system in Normal Operation presents no electrical hazards to workers outside. But ALL six conditions in NFPA 70E Article 130.2(A)(4) must be simultaneously true. One failure = both hazards present.</p><div class=\"normal-op-grid\"><div class=\"norm-item\"><div class=\"norm-num\">1</div><div><strong>Properly Installed</strong> — per applicable codes and manufacturer's instructions</div></div><div class=\"norm-item\"><div class=\"norm-num\">2</div><div><strong>Properly Maintained</strong> — per manufacturer's recommendations. Missed maintenance fails this condition.</div></div><div class=\"norm-item\"><div class=\"norm-num\">3</div><div><strong>Fully Enclosed</strong> — no covers missing, all conductors enclosed. A single missing panel fails this.</div></div><div class=\"norm-item\"><div class=\"norm-num\">4</div><div><strong>Doors Closed and Secured</strong> — closed AND latched. Propped open does not qualify.</div></div><div class=\"norm-item\"><div class=\"norm-num\">5</div><div><strong>No Evidence of Impending Failure</strong> — no damage, loose parts, arcing sounds, overheating, burning smell. If anything seems wrong — it fails.</div></div><div class=\"norm-item\"><div class=\"norm-num\">6</div><div><strong>Properly Rated Devices</strong> — all circuit breakers and switches used within intended rating and application.</div></div></div><div class=\"warn-box\">ANY ONE condition failing = both shock and arc flash hazards present, even if the system appears to run perfectly. One failure immediately escalates the task to Level 3.</div></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-list\"></i>What is \"Exposed\"?</div><div class=\"info-box\"><strong>NFPA 70E definition of Exposed (as applied to energized electrical conductors):</strong><br><br>\"Capable of being inadvertently touched. Applied to electrical conductors or circuit parts that are not suitably guarded, isolated, or insulated.\"<br><br>If you can reach or touch the terminals without removing a barrier, cover, or insulation — they are Exposed. The test is whether inadvertent contact is possible, not whether you intend to touch them.</div></div><div class=\"knowledge-check\" data-id=\"l2c_bounds\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">A system is running with a burning smell coming from it. Normal Operation? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">No. A burning smell is evidence of impending failure — Condition 5 fails. Both hazards are present. This immediately becomes a Level 3 situation.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Who may enter the Limited Approach boundary without an escort? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Only Qualified persons (Level 2 or Level 3 certified). Unqualified persons may enter only when escorted by a Qualified person.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">Give the NFPA 70E definition of \"Exposed\" for HV conductors. <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Capable of being inadvertently touched. Applied to electrical conductors or circuit parts that are not suitably guarded, isolated, or insulated. The test is whether inadvertent contact is possible.</div></div></div>";
CHAPTERS["l2c1"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-list-search\"></i>Applying Your Knowledge — Hazard Identification</div><p>Now that you understand approach boundaries, Normal Operation, and what \"Exposed\" means — it is time to apply that knowledge. The two questions you must answer before approaching any HV setup:</p><div class=\"def-cards\"><div class=\"def-card\"><div class=\"def-label\">Question 1</div><div class=\"def-body\">What electrical hazards are present for this high voltage task? Is it shock only, arc flash only, both, or neither?</div></div><div class=\"def-card\"><div class=\"def-label\">Question 2</div><div class=\"def-body\">What PPE is required at my working distance? Does the arc flash label give me the information I need, or do I need an arc flash study?</div></div></div><p style=\"margin-top:14px\">Level 2 and Level 3 training both cover hazard identification. In Level 2, you focus on which scenarios authorize Level 2 work and which escalate to Level 3. Recognizing Level 3 situations before you encounter them in the field is just as important as knowing how to perform Level 2 work.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-flask\"></i>Interactive Scenario Trainer</div><p>Work through all 7 scenarios using the interactive trainer. Each scenario shows a real training image from Archer's curriculum. Select the correct hazard classification before seeing the answer and explanation. Take your time on each one.</p><div style=\"text-align:center;padding:24px;background:var(--sand-light);border:1px solid var(--sand);border-radius:3px;margin-top:14px\"><div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--red);margin-bottom:8px\">Interactive Scenario Trainer</div><div style=\"font-size:14px;margin-bottom:6px;font-weight:700\">7 real scenarios — identify hazards, get immediate feedback</div><div style=\"font-size:13px;color:var(--gray);margin-bottom:16px;line-height:1.6\">Each scenario shows the actual slide image from Archer's training materials. Select your hazard classification and see exactly why you were right or wrong, with full explanations from NFPA 70E.</div><button class=\"btn red\" onclick=\"window.open('scenarios.html','_blank')\"><i class=\"ti ti-external-link\"></i> Open Scenario Trainer</button></div></div><div class=\"knowledge-check\" data-id=\"l2c1\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What two questions must you answer before approaching any HV task? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">1) What electrical hazards are present? 2) What PPE is required at my working distance?</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">An enclosed system is operating abnormally. What level and what hazards? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Level 3 task. Both shock and arc flash hazards present. Abnormal operation fails Condition 5 of Normal Operation even though the system is enclosed.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">When operating a HV disconnect, what hazard is present and when is PPE not required? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Arc flash hazard only (no shock hazard). PPE not required if the arc flash incident energy is less than 1.2 cal/cm². Always check the arc flash label on the disconnect first.</div></div></div>";
CHAPTERS["l2c2"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-shield\"></i>PPE Overview</div><p>PPE is the last line of defense. It does not eliminate or reduce the hazard — it protects you if all other controls fail. For HV work at Archer, five categories of PPE are required. NFPA 70E classifies PPE into 4 categories based on arc flash incident energy. The highest working voltage and arc flash incident energy at your working distance both drive the selection.</p><p><strong>The critical rule:</strong> wear ALL PPE items under your required category. Wearing some but not others does not provide the rated protection — the category assumes all items are worn together simultaneously.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-eyeglass\"></i>1. Safety Glasses</div><p>Highly recommended when working around high voltage systems and rotating equipment. Protection against flying debris, UV radiation from electrical arcs, and molten metal droplets that can be present during an arc flash event.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-hand-stop\"></i>2. High Voltage Rubber Insulating Gloves</div><div class=\"img-wrap\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAH2AtADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYa owledge-check\" data-id=\"l2c2\"><div class=\"kc-title\">Knowledge Check</div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">How often must HV rubber insulating gloves be dielectrically tested and what daily check is required? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Every 6 months. Before each day's use: inflate the gloves and check for air leaks, pinholes, and cracking.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">When must a hard hat shell be replaced and why? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Every 5 years. UV exposure and impacts degrade the material even when no visible damage is present. Internal suspension every 2 years.</div></div><div class=\"kc-item\"><div class=\"kc-q\" onclick=\"toggleKC(this)\">What two factors determine the PPE category you need? <i class=\"ti ti-chevron-down\"></i></div><div class=\"kc-a\">Highest working voltage and arc flash incident energy at your working distance. Both must be known before correctly selecting PPE.</div></div></div>";
CHAPTERS["l2c3"] = "<div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-lock\"></i>What is Lockout/Tagout?</div><p>Lockout/Tagout (LOTO) is a formal safety procedure ensuring hazardous energy is isolated and rendered inoperative before HV maintenance or servicing. Without LOTO, a system could be accidentally re-energized by someone in another part of the building while you have your hands inside the equipment. LOTO physically prevents this.</p><p>LOTO is Step 3 of the 5 Safety Rules and one of the most critical administrative controls in Archer's HV safety program. It is not a paperwork exercise — it is a physical lock that prevents re-energization.</p></div><div class=\"section-block\"><div class=\"section-title\"><i class=\"ti ti-list-numbers\"></i>The 4-Step LOTO Procedure</div><div class=\"loto-step\"><div class=\"loto-step-header\"><div class=\"loto-num\">Step 1</div><div class=\"loto-step-title\">Label the lock and the key</div></div><div class=\"img-wrap\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAFmAYsDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwBMZ59aRgd2Ov0px4PuaXJ7LyPSoNCNuh3j24qMkbRge1StkZIPLVET9CPpTJDGOp6Uv8B4yR05oPIyfwpFYs2TQDBcnjOKXeynnBx3FISUXj7p796UHKDC7eO9Ahv3m+XNSxx5z
