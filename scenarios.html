<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archer SafeTrain - Hazard ID Scenarios</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@100;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--white:#FFF;--sand:#E5E0D9;--sand-light:#F2EFEB;--black:#000;--gray:#807A70;--red:#CC0000;--red-light:#FFF0F0;--green:#006600;--green-light:#F0FFF0}
html,body{min-height:100%;background:var(--sand-light);font-family:"Archivo",Arial,sans-serif;font-size:14px;color:var(--black)}
.wrap{max-width:720px;margin:0 auto;padding:32px 20px 80px}
.eyebrow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--red);margin-bottom:8px}
.title{font-size:28px;font-weight:100;margin-bottom:6px}
.sub{font-size:13px;color:var(--gray);margin-bottom:20px}
.prog-track{height:3px;background:var(--sand);margin-bottom:6px}
.prog-fill{height:3px;background:var(--black);transition:width .3s}
.prog-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--gray);margin-bottom:20px}
.dots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.dot{width:28px;height:28px;border:1.5px solid var(--sand);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--gray)}
.dot.active{background:var(--black);border-color:var(--black);color:var(--white)}
.dot.correct{background:var(--green);border-color:var(--green);color:var(--white)}
.dot.wrong{background:var(--red);border-color:var(--red);color:var(--white)}
.card{background:var(--white);border:1px solid var(--sand);border-radius:3px;padding:24px;margin-bottom:16px}
.scenario-num{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--gray);margin-bottom:8px}
.scenario-title{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
.scenario-img{width:100%;border:1px solid var(--sand);border-radius:2px;display:block;margin-bottom:16px}
.question{font-size:15px;line-height:1.6;margin-bottom:20px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.opt{padding:14px 16px;border:1.5px solid var(--sand);border-radius:2px;cursor:pointer;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-align:center;background:var(--white)}
.opt:hover{border-color:var(--black);background:var(--sand-light)}
.opt.selected-correct{border-color:var(--green);background:var(--green-light);color:var(--green);cursor:default}
.opt.selected-wrong{border-color:var(--red);background:var(--red-light);color:var(--red);cursor:default}
.opt.reveal-correct{border-color:var(--green);color:var(--green);cursor:default}
.opt.locked{cursor:default}
.feedback{padding:14px 16px;border-radius:2px;font-size:13px;line-height:1.7;margin-top:4px}
.feedback.correct{background:var(--green-light);border:1px solid #AADDAA;border-left:3px solid var(--green);color:#004400}
.feedback.wrong{background:var(--red-light);border:1px solid #FFCCCC;border-left:3px solid var(--red);color:#880000}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:1.5px solid var(--black);border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;background:var(--black);color:var(--white);font-family:"Archivo",Arial,sans-serif}
.btn.ghost{background:var(--white);color:var(--black)}
.btn.red{background:var(--red);border-color:var(--red)}
.btn[disabled]{opacity:.3;cursor:not-allowed;pointer-events:none}
.results{background:var(--white);border:1px solid var(--sand);border-radius:3px;padding:40px;text-align:center}
.r-score{font-size:64px;font-weight:100;line-height:1}
.r-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--gray);margin:8px 0 20px}
.r-bar{height:4px;background:var(--sand);max-width:240px;margin:0 auto 16px}
.r-bar-fill{height:4px}
.r-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.rstat{background:var(--sand-light);border:1px solid var(--sand);border-radius:2px;padding:14px;text-align:center}
.rstat-val{font-size:24px;font-weight:100}
.rstat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-top:4px}
</style>
</head>

var current = 0;
var answers = new Array(SCENARIOS.length).fill(null);

function renderDots() {
  var html = '';
  for (var i = 0; i < SCENARIOS.length; i++) {
    var cls = 'dot';
    if (i === current) cls += ' active';
    else if (answers[i] !== null) cls += answers[i] === SCENARIOS[i].answer ? ' correct' : ' wrong';
    html += '<div class="' + cls + '" onclick="goTo(' + i + ')">' + (i+1) + '</div>';
  }
  document.getElementById('dots').innerHTML = html;
}

function renderProgress() {
  var done = answers.filter(function(a){ return a !== null; }).length;
  document.getElementById('prog-fill').style.width = Math.round(done / SCENARIOS.length * 100) + '%';
  document.getElementById('prog-label').textContent = done + ' of ' + SCENARIOS.length + ' answered';
}

function renderSlide() {
  var s = SCENARIOS[current];
  var answered = answers[current];
  var imgSrc = IMGS[s.img] || '';

  var optDefs = [
    {val:'both', label:'Both shock & arc flash'},
    {val:'shock', label:'Shock only'},
    {val:'arc', label:'Arc flash only'},
    {val:'none', label:'No hazards'}
  ];

  var optsHTML = '';
  for (var i = 0; i < optDefs.length; i++) {
    var o = optDefs[i];
    var cls = 'opt';
    if (answered !== null) {
      cls += ' locked';
      if (o.val === s.answer) cls += ' reveal-correct';
      if (o.val === answered) cls += answered === s.answer ? ' selected-correct' : ' selected-wrong';
    }
    var click = answered === null ? ' onclick="pick(\'' + o.val + '\')"' : '';
    optsHTML += '<div class="' + cls + '"' + click + '>' + o.label + '</div>';
  }

  var feedHTML = '';
  if (answered !== null) {
    var ok = answered === s.answer;
    feedHTML = '<div class="feedback ' + (ok ? 'correct' : 'wrong') + '">'
      + (ok ? '<strong>Correct.</strong> ' : '<strong>Incorrect.</strong> ')
      + (ok ? s.correct_exp : s.wrong_exp) + '</div>';
  }

  var prevBtn = current > 0
    ? '<button class="btn ghost" onclick="goTo(' + (current-1) + ')">Back</button>'
    : '<span></span>';

  var nextBtn = '';
  if (current < SCENARIOS.length - 1) {
    nextBtn = '<button class="btn"' + (answered === null ? ' disabled' : '') + ' onclick="goTo(' + (current+1) + ')">Next</button>';
  } else if (answers.filter(function(a){return a!==null;}).length === SCENARIOS.length) {
    nextBtn = '<button class="btn red" onclick="showResults()">See Results</button>';
  }

  var imgTag = imgSrc ? '<img src="' + imgSrc + '" class="scenario-img" alt="Scenario ' + s.id + '">' : '';

  var el = document.getElementById('slide');
  el.innerHTML = '<div class="card">'
    + '<div class="scenario-num">Scenario ' + s.id + ' of ' + SCENARIOS.length + '</div>'
    + '<div class="scenario-title">' + s.title + '</div>'
    + imgTag

    + '<div class="opts">' + optsHTML + '</div>'
    + feedHTML
    + '<div class="nav-row">' + prevBtn + nextBtn + '</div>'
    + '</div>';

  renderDots();
  renderProgress();
}

function pick(val) {
  if (answers[current] !== null) return;
  answers[current] = val;
  renderSlide();
}

function goTo(i) {
  current = i;
  renderSlide();
  window.scrollTo(0, 0);
}

function showResults() {
  var correct = 0;
  for (var i = 0; i < SCENARIOS.length; i++) {
    if (answers[i] === SCENARIOS[i].answer) correct++;
  }
  var pct = Math.round(correct / SCENARIOS.length * 100);
  var color = pct >= 70 ? 'var(--green)' : 'var(--red)';
  document.getElementById('dots').innerHTML = '';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete';
  document.getElementById('slide').innerHTML = '<div class="results">'
    + '<div class="r-score" style="color:' + color + '">' + pct + '%</div>'
    + '<div class="r-label">Scenario Trainer Complete</div>'
    + '<div class="r-bar"><div class="r-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<div style="font-size:12px;color:var(--gray)">' + correct + ' of ' + SCENARIOS.length + ' correct</div>'
    + '<div class="r-stats">'
    + '<div class="rstat"><div class="rstat-val" style="color:' + color + '">' + pct + '%</div><div class="rstat-lbl">Score</div></div>'
    + '<div class="rstat"><div class="rstat-val">' + correct + '</div><div class="rstat-lbl">Correct</div></div>'
    + '<div class="rstat"><div class="rstat-val">' + (SCENARIOS.length-correct) + '</div><div class="rstat-lbl">Incorrect</div></div>'
    + '</div>'
    + '<button class="btn ghost" onclick="reset()" style="margin-top:20px">Retake</button>'
    + '</div>';
}

function reset() {
  current = 0;
  answers = new Array(SCENARIOS.length).fill(null);
  renderSlide();
  window.scrollTo(0, 0);
}

window.onload = function() { renderSlide(); };
</script>
